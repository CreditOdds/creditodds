our_take: >
  The Discover it Gas and Restaurants card is no longer accepting
  applications, which means it's off the table for new cardholders. For those
  who already have it, the lack of an annual fee is a plus, especially if you
  frequently spend on gas and dining, where the card likely offers its best
  rewards. However, without access to the card's specific earn rates or
  additional benefits, it's hard to gauge its overall value compared to other
  cashback options. If you're already a cardholder, it's worth evaluating how
  well it fits your spending habits and whether it still earns a spot in your
  wallet.

