name: "Venmo Credit Card"
bank: "Synchrony"
slug: "venmo-credit-card"
image: "venmo.png"
accepting_applications: true
category: "cashback"
annual_fee: 0
reward_type: "cashback"
tags:
  - cashback
  - rewards
rewards:
  - category: "top_category"
    value: 3
    unit: "percent"
    mode: auto_top_spend
    eligible_categories:
      - "transit"
      - "travel"
      - "groceries"
      - "entertainment"
      - "dining"
      - "utilities"
      - "drugstores"
      - "gas"
    note: "Automatically on your highest-spend eligible category each statement period (8 eligible: transportation, travel, groceries, entertainment, dining & nightlife, bills & utilities, health & beauty, gas). Drugstores here represents health & beauty; bills & utilities maps to utilities."
  - category: "top_category"
    value: 2
    unit: "percent"
    mode: auto_top_spend
    eligible_categories:
      - "transit"
      - "travel"
      - "groceries"
      - "entertainment"
      - "dining"
      - "utilities"
      - "drugstores"
      - "gas"
    note: "Automatically on your second-highest eligible category each statement period (same 8-category list)."
  - category: "everything_else"
    value: 1
    unit: "percent"
apr:
  regular:
    min: 18.74
    max: 30.74
apply_link: https://venmo.com/about/creditcard
foreign_transaction_fee: false
our_take: >
  A no-fee card that auto-adjusts to your spending: 3% on your top category and 2%
  on your second each statement period, from a list of eight, with 1% on the rest.
  It is a good fit for existing Venmo users who want rewards without picking
  categories, and there are no foreign transaction fees. The tradeoff is the lack
  of a real signup bonus and a high APR up to 30.74%, so flat 2%-on-everything
  cards like the Wells Fargo Active Cash or Citi Double Cash will out-earn it
  unless your spending is concentrated in those top two categories.
