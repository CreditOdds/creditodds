name: "Bilt Palladium"
bank: "Bilt"
slug: "bilt-palladium"
image: "bilt_palladium.png"
accepting_applications: true
apply_link: https://www.biltrewards.com/card/apply
foreign_transaction_fee: false
our_take: >
  Bilt's premium card exists for one reason: paying rent with no transaction fee
  while still earning points, which no mainstream card does. At $495 it leans on
  the $400 hotel credit, $200 Bilt Cash, and Priority Pass to offset the fee.
  The 4% Bilt Cash on everyday spend is an alternative to the rent points boost
  rather than a bonus on top of the 2x points, and it is a separate, lower value
  currency, so treat it as a minor extra. It is built for renters who pay a lot and will actually use the
  travel credits and lounge access; if rent isn't a major expense, the $495 fee
  is hard to justify.
annual_fee: 495
reward_type: "points"
release_date: "2025-01-15"
benefits:
  - name: "Rent Payment Without Fees"
    value: 0
    description: "Pay rent with your credit card and earn points with no transaction fees"
    frequency: "ongoing"
    category: "other"
  - name: "Bilt Dining"
    value: 0
    description: "Earn up to 5x points at participating Bilt Dining restaurants (limited network, not all restaurants)"
    frequency: "ongoing"
    category: "dining"
    enrollment_required: false
  - name: "Bilt Travel Hotel Credit"
    value: 400
    description: "Annual hotel credit applied twice yearly as $200 statement credits for qualifying Bilt Travel Portal hotel bookings"
    frequency: "annual"
    category: "hotel"
    enrollment_required: false
  - name: "Annual Bilt Cash Award"
    value: 200
    description: "Annual Bilt Cash awarded with up to $100 rolling over into the next calendar year"
    frequency: "annual"
    category: "statement_credit"
    enrollment_required: false
  - name: "Priority Pass"
    value: 0
    description: "Complimentary Priority Pass lounge access"
    frequency: "annual"
    category: "lounge"
    enrollment_required: false
  - name: "Gold Status"
    description: "Gold Status awarded after meeting $4,000 spend requirement on purchases (excluding rent or mortgage) in first 90 days"
    frequency: "one_time"
    category: "rewards"
    enrollment_required: false
