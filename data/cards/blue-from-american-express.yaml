our_take: >
  The Blue card from American Express is no longer accepting applications,
  which means it's off the table for new cardholders. With a $0 annual fee, it
  previously offered a cost-effective way to earn points without the burden of
  yearly charges. However, without recent changes or a place on any Best-of
  lists, its relevance in today's market was already limited. Existing
  cardholders can still benefit from its rewards structure, but new applicants
  will need to look elsewhere for a similar no-fee points-earning option.
