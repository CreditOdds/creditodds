name: "Citi AAdvantage Business World Elite Mastercard"
bank: "Citi"
slug: "citibusiness-aadvantage-platinum-select-maste"
previous_names:
  - "CitiBusiness AAdvantage Platinum Select Mastercard"
accepting_applications: true
image: "citi-business-aadvantage-platinum-select.png"
annual_fee: 99
# Ongoing fee is $99, waived the first 12 months (annual_fee_intro below). Same
# JS-rendered-fee misread as the consumer Citi AAdvantage card; preempt it here so
# the business variant doesn't generate the same false-positive PRs.
check_ignore:
  - annual_fee
annual_fee_intro:
  value: 0
  months: 12
foreign_transaction_fee: false
reward_type: "miles"
our_take: >
  The Citi AAdvantage Business World Elite Mastercard is a solid choice for
  frequent American Airlines travelers, offering 2 miles per dollar on
  eligible American Airlines purchases, as well as on car rentals, gas, and
  telecommunications expenses. The card also comes with a generous signup
  bonus of 65,000 miles after spending $4,000 in the first four months, though
  this was recently reduced from 75,000 miles. The first year is free of the
  $99 annual fee, giving you a chance to evaluate its benefits like a free
  checked bag and preferred boarding on American Airlines flights. However,
  the card's value diminishes if you don't fly American Airlines often, as the
  everyday earn rate on other purchases is just 1 mile per dollar. The
  companion certificate could be a nice perk if you meet the $30,000 annual
  spend requirement, but consider if the spending aligns with your business
  needs.
tags:
  - travel
  - airline
  - business
rewards:
  - category: airlines
    value: 2
    unit: points_per_dollar
    note: "On eligible American Airlines purchases"
    merchant_gate: [american-airlines]
  - category: car_rentals
    value: 2
    unit: points_per_dollar
  - category: gas
    value: 2
    unit: points_per_dollar
  - category: phone
    value: 2
    unit: points_per_dollar
    note: "Telecommunications merchants, cable, and satellite providers"
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 65000
  type: "miles"
  spend_requirement: 4000
  timeframe_months: 4
apr:
  regular:
    min: 19.49
    max: 28.49
benefits:
  - name: "First Checked Bag Free"
    description: "First checked bag free on domestic American Airlines itineraries for the cardmember and up to 4 companions on the same reservation"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Preferred Boarding"
    description: "Group 5 boarding on American Airlines flights for the cardmember and up to 4 companions on the same reservation"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Companion Certificate"
    description: "American Airlines Companion Certificate good for domestic main-cabin travel for up to two companions ($99 ticketing fee plus taxes) after $30,000 in purchases each cardmembership year"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "25% Inflight Purchase Savings"
    description: "25% off in-flight food, beverages, and Wi-Fi purchases on American Airlines flights when paid with the card"
    frequency: "per_purchase"
    category: "statement_credit"
    enrollment_required: false
apply_link: https://www.citi.com/credit-cards/citi-aadvantage-business-credit-card
