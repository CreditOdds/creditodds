our_take: >
  The USAA Secured American Express card is a solid choice for those looking
  to build or rebuild their credit, especially with its recent removal of the
  $35 annual fee. This makes it more accessible for budget-conscious consumers
  who want to improve their credit score without additional costs. The card
  requires a security deposit, typical for secured cards, but offers a
  relatively low regular APR ranging from 11.4% to 21.4%, which can be
  beneficial if you occasionally carry a balance. However, it doesn't offer
  any rewards or cash back, so its primary function is to help you establish a
  positive credit history. If you're focused on credit building and are a USAA
  member, this card is worth considering.
