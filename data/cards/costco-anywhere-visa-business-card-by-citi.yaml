our_take: >
  The Costco Anywhere Visa Business by Citi stands out with its strong 4% cash
  back on eligible gas and EV charging, making it a great option for
  businesses with significant fuel expenses. Additionally, it offers 3% back
  on dining and travel, including Costco Travel, and 2% on Costco purchases,
  all with no annual fee. However, the card's rewards are less compelling for
  non-Costco purchases, as it only earns 1% back on everything else. The lack
  of a foreign transaction fee is a plus for international business travel.
  Overall, it's a solid choice for Costco members who can maximize the higher
  earn rates in specific categories.
