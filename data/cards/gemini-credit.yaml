our_take: >
  The Gemini Credit card offers a solid cashback structure with no annual fee,
  making it a worthwhile option for those who spend on gas, dining, and
  groceries. You'll earn 4% back on gas and EV charging for the first $300
  each month, 3% on dining, and 2% on groceries, which can add up if these are
  your primary expenses. However, the card's appeal diminishes if your
  spending doesn't align with these categories, as everything else earns just
  1%. With no foreign transaction fees, it's also a practical choice for
  international use. Keep in mind the regular APR ranges from 18.99% to
  34.99%, so carrying a balance could become costly.
