name: "Apple Card"
bank: "Goldman Sachs"
slug: "apple-card"
image: "apple_card.png"
accepting_applications: true
annual_fee: 0
reward_type: cashback
rewards:
  - category: online_shopping
    value: 3
    unit: percent
    note: "Apple purchases and select merchants via Apple Pay (Nike, Uber, Walgreens, Booking.com, ChargePoint, Duane Reade, Exxon Mobil, Hertz, Ace Hardware)"
    # Bonus is gated to a fixed merchant list — exclude from generic
    # category matching so store pages don't surface this card for
    # arbitrary online retailers (e.g. bloomingdales.com).
    merchant_specific: true
  - category: dining
    value: 2
    unit: percent
    note: "Via Apple Pay"
  - category: transit
    value: 2
    unit: percent
    note: "Via Apple Pay"
  - category: groceries
    value: 2
    unit: percent
    note: "Via Apple Pay"
  - category: everything_else
    value: 2
    unit: percent
    note: "2% Daily Cash requires paying with Apple Pay; the physical titanium card earns 1%"
tags:
  - cashback
apr:
  regular:
    min: 17.49
    max: 27.74
apply_link: https://www.apple.com/apple-card/
foreign_transaction_fee: false
our_take: >
  The Apple Card stands out for its seamless integration with Apple Pay,
  offering 3% cash back on Apple purchases and select merchants like Nike and
  Uber, and 2% on dining, transit, and groceries when using Apple Pay. There's
  no annual fee, making it an attractive option for Apple enthusiasts who
  frequently use Apple Pay. However, if you rely on the physical card, the
  cash back drops to just 1% on all purchases, which is a significant
  drawback. The card also includes some niche perks like a six-month free
  trial of Uber One and travel credits on Booking.com, but these require
  enrollment and might not appeal to everyone. Overall, it's a solid choice
  for digital wallet users who can maximize the higher cash back rates through
  Apple Pay.
benefits:
  - name: "Booking.com Travel Credits"
    value: 2
    value_unit: "percent"
    description: "2% in Booking.com Travel Credits on eligible stays and car rentals booked through the Apple Card portal (in addition to 3% Daily Cash back)."
    frequency: "per_purchase"
    category: "travel"
    enrollment_required: true
  - name: "Uber One Free Trial"
    value: 6
    description: "Six-month free trial of Uber One when signing up with Apple Card through the designated link."
    frequency: "one_time"
    category: "rideshare"
    enrollment_required: true
    merchants:
      - uber
      - uber-eats
  - name: "Hertz Car Rental Benefits"
    value: 5
    value_unit: "percent"
    description: "At least 5% off Hertz Pay Later base rates, free emergency roadside service, discounted loss damage waiver, and free additional driver at pickup."
    frequency: "per_rental"
    category: "car_rental"
    enrollment_required: true
