name: "Atmos Rewards Business"
bank: "Bank of America"
slug: "atmos-rewards-business"
image: "atmos-rewards-business.png"
accepting_applications: true
apply_link: https://business.bankofamerica.com/en/credit-cards/atmos-rewards
category: "business"
annual_fee: 95
# $70 per company + $25 per card = $95 effective. The apply page only exposes the
# $70 per-company figure, so card-page-check (a single-number extractor) keeps
# proposing 95 -> 70. Ignore annual_fee for this card. (#1413/#1421/#1426/#1434)
check_ignore:
  - annual_fee
foreign_transaction_fee: false
our_take: >
  The Atmos Rewards Business card from Bank of America is a strong contender
  for businesses that frequently book flights with Alaska Airlines, offering 3
  points per dollar on airline purchases and a 70,000-point signup bonus after
  spending $4,000 in the first 90 days. The card also comes with valuable
  travel perks like a free checked bag, priority boarding, and an annual coach
  companion fare on Alaska Airlines, enhancing its appeal for frequent flyers.
  However, the $95 annual fee is a consideration, and the recent drop in the
  signup bonus from 80,000 to 70,000 points might be a disappointment for
  those looking for the maximum initial value. With no foreign transaction
  fees and no personal credit reporting, it can be a smart choice for business
  owners who travel internationally and want to manage their personal credit
  utilization separately. Just keep in mind that outside of travel, the
  rewards rate drops to 1 point per dollar on most other purchases.
tags:
  - travel
  - airline
  - business
  - rewards
reward_type: "points"
rewards:
  - category: airlines
    value: 3
    unit: points_per_dollar
  - category: gas
    value: 2
    unit: points_per_dollar
  - category: ev_charging
    value: 2
    unit: points_per_dollar
  - category: transit
    value: 2
    unit: points_per_dollar
  - category: shipping
    value: 2
    unit: points_per_dollar
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 70000
  type: "points"
  spend_requirement: 4000
  timeframe_months: 3
  note: "Get 70,000 bonus points and a $99 Companion Fare (plus taxes and fees from $23) after you make $4,000 or more in purchases within the first 90 days of opening your account."
benefits:
  - name: "Coach Companion Fare"
    description: "Annual Coach Companion Fare from $121 (taxes and fees apply) on a paid Alaska Airlines flight"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Free Checked Bag"
    description: "First checked bag free for the cardmember on Alaska Airlines flights when paid with the card"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Priority Boarding"
    description: "Priority boarding on Alaska Airlines flights when paid with the card"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Alaska Lounge+ Membership Discount"
    value: 100
    description: "$100 off an annual Alaska Lounge+ Membership"
    frequency: "annual"
    category: "lounge"
    enrollment_required: false
  - name: "No Personal Credit Reporting"
    description: "Card activity does not report to personal credit bureaus, helpful for managing personal credit utilization and 5/24-style limits"
    frequency: "annual"
    category: "other"
    enrollment_required: false
  - name: "Inflight Purchase Rebate"
    value: 20
    value_unit: "percent"
    description: "20% back on Alaska Airlines and Hawaiian Airlines inflight purchases"
    frequency: "per_purchase"
    category: "rewards"
    enrollment_required: false
