name: "Atmos Rewards Business"
bank: "Bank of America"
slug: "atmos-rewards-business"
image: "atmos-rewards-business.png"
accepting_applications: true
apply_link: https://business.bankofamerica.com/en/credit-cards/atmos-rewards
category: "business"
annual_fee: 95
# $70 per company + $25 per card = $95 effective. The apply page only exposes the
# $70 per-company figure, so card-page-check (a single-number extractor) keeps
# proposing 95 -> 70. Ignore annual_fee for this card. (#1413/#1421/#1426/#1434)
check_ignore:
  - annual_fee
foreign_transaction_fee: false
our_take: >
  A business card built for Alaska and Atmos Rewards loyalists: 3x on airfare,
  free first checked bag, an annual coach companion fare, and an 80,000-point
  signup bonus after $5,000 in spend, with no foreign transaction fees. The
  effective $95 fee (a $70 company fee plus $25 per card) is reasonable for the
  perks, and the fact that activity does not hit your personal credit is a real
  plus for keeping personal utilization clean. Worth it only if you actually fly
  Alaska, since the 2x non-airline categories are nothing special.
tags:
  - travel
  - airline
  - business
  - rewards
reward_type: "points"
rewards:
  - category: airlines
    value: 3
    unit: points_per_dollar
  - category: gas
    value: 2
    unit: points_per_dollar
  - category: ev_charging
    value: 2
    unit: points_per_dollar
  - category: transit
    value: 2
    unit: points_per_dollar
  - category: shipping
    value: 2
    unit: points_per_dollar
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 80000
  type: points
  spend_requirement: 5000
  timeframe_months: 3
benefits:
  - name: "Coach Companion Fare"
    description: "Annual Coach Companion Fare from $121 (taxes and fees apply) on a paid Alaska Airlines flight"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Free Checked Bag"
    description: "First checked bag free for the cardmember on Alaska Airlines flights when paid with the card"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Priority Boarding"
    description: "Priority boarding on Alaska Airlines flights when paid with the card"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "Alaska Lounge+ Membership Discount"
    value: 100
    description: "$100 off an annual Alaska Lounge+ Membership"
    frequency: "annual"
    category: "lounge"
    enrollment_required: false
  - name: "No Personal Credit Reporting"
    description: "Card activity does not report to personal credit bureaus, helpful for managing personal credit utilization and 5/24-style limits"
    frequency: "annual"
    category: "other"
    enrollment_required: false
