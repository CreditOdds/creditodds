our_take: >
  The Hawaiian Airlines World Elite Mastercard offers a compelling 50,000-mile
  signup bonus after spending $2,000 in the first three months, making it a
  strong contender for travelers loyal to Hawaiian Airlines. With 3 miles per
  dollar on Hawaiian Airlines purchases and 2 miles per dollar on gas, dining,
  and groceries, it provides solid earning potential for everyday expenses.
  However, the $99 annual fee is a consideration, especially if you're not a
  frequent flyer with Hawaiian Airlines. The card also features a 15-month 0%
  intro APR on balance transfers, which can be useful if you're looking to
  consolidate debt. While it ranks #10 among Best Airline Credit Cards, its
  value diminishes if you're not leveraging the airline-specific rewards.
