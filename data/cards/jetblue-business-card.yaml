name: "JetBlue Business"
bank: "Barclays"
slug: "jetblue-business-card"
accepting_applications: true
apply_link: https://cards.barclaycardus.com/banking/cards/jetblue-business-card/
category: "business"
image: "barclays-jetblue-business.png"
annual_fee: 99
foreign_transaction_fee: false
reward_type: "points"
tags:
  - travel
  - airline
  - business
  - rewards
rewards:
  - category: "airlines"
    value: 6
    unit: "points_per_dollar"
    note: "JetBlue purchases"
    merchant_gate: [jetblue]
  - category: "dining"
    value: 2
    unit: "points_per_dollar"
  - category: "office_supplies"
    value: 2
    unit: "points_per_dollar"
  - category: "everything_else"
    value: 1
    unit: "points_per_dollar"
signup_bonus:
  value: 50000
  type: "points"
  spend_requirement: 4000
  timeframe_months: 3
apr:
  regular:
    min: 19.49
    max: 29.49
our_take: >
  The JetBlue Business earns 6x on JetBlue and adds business-friendly 2x on dining
  and office supplies, and the $99 fee is easy to justify if you fly JetBlue:
  free first checked bag, 50% off inflight purchases, and a 5,000-point anniversary
  bonus. The catch is the rewards are TrueBlue points, which are most valuable on
  JetBlue itself, so this is a card for loyal JetBlue flyers rather than a
  general business card.
benefits:
  - name: "Anniversary Points Bonus"
    value: 5000
    value_unit: "points"
    description: "5,000 bonus TrueBlue points each year after your account anniversary"
    frequency: "annual"
    category: "rewards"
    enrollment_required: false
  - name: "First Checked Bag Free"
    description: "First checked bag free for the cardmember and up to 3 traveling companions on JetBlue-operated flights when the card is used to book"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "50% Off Inflight Purchases"
    description: "50% savings on eligible food, drinks, and Wi-Fi purchased on JetBlue-operated flights"
    frequency: "per_purchase"
    category: "statement_credit"
    enrollment_required: false
  - name: "Mosaic Status Boost"
    description: "Earn Mosaic elite status after $50,000 in eligible purchases per calendar year"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Award Flight Points Rebate"
    value: 10
    value_unit: "percent"
    description: "Get 10% of your points back after you redeem for and travel on a JetBlue-operated Award Flight"
    frequency: "per_trip"
    category: "rewards"
    enrollment_required: false
  - name: "JetBlue Vacations Statement Credit"
    value: 100
    description: "Receive a $100 statement credit after you purchase a JetBlue Vacations package of $100 or more with your card. Limited to one statement credit per calendar year."
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Group 3 Boarding"
    description: "Group 3 boarding on JetBlue-operated flights"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
