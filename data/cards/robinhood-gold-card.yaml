name: "Robinhood Gold"
bank: "Robinhood"
slug: "robinhood-gold-card"
accepting_applications: true
image: "robinhood-gold-card.png"
release_date: "2024-03-26"
# The $50 annual_fee models the required Robinhood Gold membership ($5/mo or
# $50/yr) you must hold to get this card. The card page itself lists a $0 annual
# fee, so card-page-check keeps proposing 50 -> 0. The $50 is an intentional
# modeling decision (#1494); ignore annual_fee for this card.
check_ignore:
  - annual_fee
annual_fee: 50
benefits:
  - name: "Travel Insurance"
    value: 0
    description: "Trip cancellation, trip delay, and lost luggage protection"
    frequency: "ongoing"
    category: "travel"
  - name: "Cell Phone Protection"
    value: 0
    description: "Cell phone damage and theft protection when you pay your bill with the card"
    frequency: "ongoing"
    category: "other"
  - name: "No Foreign Transaction Fees"
    value: 0
    description: "No foreign transaction fees on purchases made abroad"
    frequency: "ongoing"
    category: "travel"
tags:
  - cashback
  - rewards
reward_type: "cashback"
rewards:
  - category: travel_portal
    value: 5
    unit: percent
    note: "Travel booked through Robinhood travel portal"
  - category: everything_else
    value: 3
    unit: percent
apr:
  regular:
    min: 29.99
    max: 29.99
apply_link: https://robinhood.com/creditcard/
foreign_transaction_fee: false
our_take: >
  The Robinhood Gold card stands out with a solid 5% cash back on travel
  booked through its own portal and a competitive 3% on all other purchases.
  This makes it a strong contender for those who want straightforward cash
  back on everyday spending without juggling multiple categories. However, the
  $50 annual fee and a high 29.99% APR mean it's best suited for those who pay
  their balance in full each month. The card also offers useful perks like
  travel insurance and cell phone protection, plus no foreign transaction
  fees, which can add peace of mind for frequent travelers. If you can
  leverage the rewards and avoid carrying a balance, it could be a valuable
  addition to your wallet.
