name: "Robinhood Gold"
bank: "Robinhood"
slug: "robinhood-gold-card"
accepting_applications: true
image: "robinhood-gold-card.png"
release_date: "2024-03-26"
# The $50 annual_fee models the required Robinhood Gold membership ($5/mo or
# $50/yr) you must hold to get this card. The card page itself lists a $0 annual
# fee, so card-page-check keeps proposing 50 -> 0. The $50 is an intentional
# modeling decision (#1494); ignore annual_fee for this card.
check_ignore:
  - annual_fee
annual_fee: 50
benefits:
  - name: "Travel Insurance"
    value: 0
    description: "Trip cancellation, trip delay, and lost luggage protection"
    frequency: "ongoing"
    category: "travel"
  - name: "Cell Phone Protection"
    value: 0
    description: "Cell phone damage and theft protection when you pay your bill with the card"
    frequency: "ongoing"
    category: "other"
  - name: "No Foreign Transaction Fees"
    value: 0
    description: "No foreign transaction fees on purchases made abroad"
    frequency: "ongoing"
    category: "travel"
tags:
  - cashback
  - rewards
reward_type: "cashback"
rewards:
  - category: travel_portal
    value: 5
    unit: percent
    note: "Travel booked through Robinhood travel portal"
  - category: everything_else
    value: 3
    unit: percent
apr:
  regular:
    min: 29.99
    max: 29.99
apply_link: https://robinhood.com/creditcard/
foreign_transaction_fee: false
our_take: >
  The headline 3% flat cash back on everything is the best unlimited rate going, beating
  standard 2% cards by a wide margin, with 5% on travel booked through Robinhood and no
  foreign transaction fees. The real cost is the Robinhood Gold subscription you must keep to
  hold the card, so factor that fee in: at moderate spend the 3% still wins, but it erodes the
  edge for light spenders. Access has also been gated by waitlist, and the 29.99% APR means
  this only pays off if you clear the balance every month.
