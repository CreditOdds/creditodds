name: "JetBlue Plus"
bank: "Barclays"
slug: "jetblue-plus-card"
accepting_applications: true
apply_link: https://cards.barclaycardus.com/banking/cards/jetblue-plus-card/
category: "travel"
image: "barclays-jetblue-plus.png"
annual_fee: 99
foreign_transaction_fee: false
reward_type: "points"
our_take: >
  For regular JetBlue flyers this is an easy pick and one of the stronger airline cards on
  our list: 6x on JetBlue, a free first checked bag, and a 5,000-point anniversary bonus that
  roughly offsets the $99 fee on its own. The free bag alone usually pays for the card if you
  fly JetBlue even twice a year, and the no-fee JetBlue card skips both the bag and the 6x.
  The catch is it is only worth carrying if JetBlue is genuinely your airline.
tags:
  - travel
  - airline
  - rewards
rewards:
  - category: airlines
    value: 6
    unit: points_per_dollar
    note: "JetBlue purchases"
    merchant_gate: [jetblue]
  - category: dining
    value: 2
    unit: points_per_dollar
  - category: groceries
    value: 2
    unit: points_per_dollar
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 60000
  type: "points"
  spend_requirement: 1000
  timeframe_months: 3
apr:
  balance_transfer_intro:
    rate: 0
    months: 12
  regular:
    min: 20.24
    max: 29.99
benefits:
  - name: "Anniversary Points Bonus"
    value: 5000
    value_unit: "points"
    description: "5,000 bonus TrueBlue points each year after your account anniversary"
    frequency: "annual"
    category: "rewards"
    enrollment_required: false
  - name: "First Checked Bag Free"
    description: "First checked bag free for the cardmember and up to 3 traveling companions on JetBlue-operated flights when the card is used to book"
    frequency: "per_flight"
    category: "travel"
    enrollment_required: false
  - name: "50% Off Inflight Purchases"
    description: "50% savings on eligible food, drinks, and Wi-Fi purchased on JetBlue-operated flights"
    frequency: "per_purchase"
    category: "statement_credit"
    enrollment_required: false
  - name: "Mosaic Status Boost"
    description: "Earn Mosaic elite status after $50,000 in eligible purchases per calendar year"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Award Flight Points Rebate"
    value: 10
    value_unit: "percent"
    description: "Get 10% of your points back after you redeem for and travel on a JetBlue-operated Award Flight."
    frequency: "per_trip"
    category: "rewards"
    enrollment_required: false
  - name: "JetBlue Vacations Statement Credit"
    value: 100
    description: "Receive a $100 statement credit after you purchase a JetBlue Vacations package of $100 or more with your card. Limited to one statement credit per year."
    frequency: "annual"
    category: "travel"
    enrollment_required: false
