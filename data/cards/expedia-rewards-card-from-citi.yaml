our_take: >
  The Expedia Rewards from Citi card is no longer accepting applications,
  which limits its appeal to current cardholders. With no annual fee, it was
  an accessible option for those who frequently book travel through Expedia
  and wanted to earn points without added costs. However, the card's value was
  primarily tied to its rewards structure, and without the ability to apply,
  new users will need to look elsewhere for similar benefits. Existing
  cardholders can continue to use it for Expedia bookings, but should evaluate
  if it still fits their travel and spending habits.
