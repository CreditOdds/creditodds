our_take: >
  The American Express Business Gold card stands out with a hefty signup bonus
  that recently doubled to as high as 200,000 Membership Rewards points,
  though the exact offer may vary. This makes it an attractive option for
  businesses with significant spending, especially since it offers 4 points
  per dollar on your top two spending categories each month from a list of
  six, including airfare and U.S. restaurants, up to $150,000 annually.
  However, the $375 annual fee is a notable consideration, though it is
  somewhat offset by up to $240 in statement credits for select U.S. purchases
  and other benefits like $300 in ChatGPT credits. Beyond the signup bonus and
  rewards, the card includes perks like no foreign transaction fees, but be
  mindful that the rewards drop to 1 point per dollar after the cap, which
  could limit its value for very high spenders. Overall, it's a strong choice
  for businesses that can maximize the rewards categories and take advantage
  of the credits.
