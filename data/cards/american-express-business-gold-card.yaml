name: "American Express Business Gold"
bank: "American Express"
slug: "american-express-business-gold-card"
accepting_applications: true
category: "business"
image: "american-express-business-gold.png"
annual_fee: 375
reward_type: "points"
rewards:
  - category: top_category
    value: 4
    unit: points_per_dollar
    mode: auto_top_spend
    choices: 2
    eligible_categories:
      - electronics_stores
      - dining
      - gas
      - transit
      - phone
    note: "Automatically on your top 2 spending categories each billing cycle from 6 eligible (U.S. advertising, U.S. electronic goods retailers and software/cloud providers, U.S. restaurants, U.S. gas stations, transit, U.S. wireless telephone service), combined cap. Flights earn 3x via AmexTravel.com."
    spend_cap: 150000
    cap_period: annual
    rate_after_cap: 1
  - category: travel_portal
    value: 3
    unit: points_per_dollar
    note: "Flights and prepaid hotels booked via AmexTravel.com"
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 200000
  type: "points"
  spend_requirement: 15000
  timeframe_months: 3
  note: 'Amex advertises this as "as high as 200,000 Membership Rewards Points"; actual offer may be lower.'
apr:
  regular:
    min: 17.74
    max: 28.49
benefits:
  - name: "Business Statement Credits"
    value: 240
    description: "Up to $20/month in statement credits on eligible U.S. purchases at FedEx, Grubhub, and office supply stores"
    frequency: "monthly"
    category: "other"
    enrollment_required: true
    merchants:
      - fedex-office
      - grubhub
  - name: "ChatGPT Credits"
    value: 300
    description: "$300 in annual ChatGPT credits for AI-powered productivity tools"
    frequency: "annual"
    category: "other"
    enrollment_required: true
  - name: "Walmart+ Credit"
    value: 155
    value_per_cycle: 13
    description: "Up to $12.95/month plus applicable taxes toward one monthly Walmart+ membership"
    frequency: "monthly"
    category: "shopping"
    enrollment_required: true
    merchants:
      - walmart
  - name: "Squarespace Credit"
    value: 150
    description: "Up to $150 back annually in statement credits for U.S. purchases with Squarespace."
    frequency: "annual"
    category: "statement_credit"
    enrollment_required: true
  - name: "The Hotel Collection Credit"
    value: 100
    description: "$100 credit toward eligible on-property charges plus a room upgrade when available at over 1,300 hotels, on two-night-minimum stays booked through AmexTravel.com."
    frequency: "per_purchase"
    category: "hotel"
    enrollment_required: false
tags:
  - business
  - rewards
  - premium
apply_link: https://www.americanexpress.com/us/credit-cards/business/business-credit-cards/american-express-business-gold-card-amex/
foreign_transaction_fee: false
our_take: >
  Built for businesses with lumpy, varied spend: 4x auto-applies to your top
  two categories each cycle (U.S. advertising, electronics and cloud, dining,
  gas, transit, wireless) up to $150k a year, which beats fixed-category
  business cards if your spending moves around. The catch is a $375 fee that you mostly justify through
  the statement credits (FedEx/Grubhub/office supply, Walmart+, Squarespace),
  so it pays off only if you actually use those. If you want simpler flat-rate
  earning, the no-fee Blue Business Plus is the easier hold.
