name: "Delta SkyMiles Blue American Express"
bank: "American Express"
slug: "delta-skymiles-blue-american-express-card"
image: "amex_delta_blue_skymiles.png"
accepting_applications: true
apply_link: https://www.americanexpress.com/us/credit-cards/card/delta-skymiles-blue-american-express-card/
foreign_transaction_fee: false
our_take: >
  The entry-level Delta card: no annual fee, 2x on Delta and dining, and no
  foreign transaction fees, but it skips the checked bags, priority boarding,
  and companion certificate that justify the paid Gold and Platinum versions.
  Get it only if you fly Delta lightly and want to keep miles alive without a
  fee; frequent flyers will earn far more value stepping up to Gold.
annual_fee: 0
reward_type: "miles"
tags:
  - airline
  - travel
rewards:
  - category: airlines
    value: 2
    unit: points_per_dollar
    note: "Delta purchases"
    merchant_gate: [delta-air-lines]
  - category: dining
    value: 2
    unit: points_per_dollar
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 10000
  type: miles
  spend_requirement: 1000
  timeframe_months: 6
apr:
  regular:
    min: 19.49
    max: 28.49
benefits:
  - name: "Inflight Purchase Statement Credit"
    value: 20
    value_unit: "percent"
    description: "Receive 20% savings as a statement credit after using your Card on eligible Delta in-flight food and beverage purchases."
    frequency: "per_purchase"
    category: "statement_credit"
    enrollment_required: false
  - name: "Amex Venue Collection"
    value: 250
    description: "10% back on qualifying concessions purchases at select stadiums and arenas up to $250 per calendar year."
    frequency: "annual"
    category: "entertainment"
    enrollment_required: true
