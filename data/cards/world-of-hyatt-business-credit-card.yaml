our_take: >
  The World of Hyatt Business card offers a compelling choice for business
  travelers loyal to Hyatt, with up to 9x points on Hyatt stays and a solid 4x
  earn rate at their hotels. The card's standout feature is the annual free
  night award at any Category 1-4 Hyatt hotel, which can easily offset the
  $199 annual fee if used strategically. However, the recent reduction in the
  signup bonus from 80,000 to 60,000 points makes it less enticing upfront.
  The card also provides ongoing benefits like automatic Discoverist status
  and 5 qualifying night credits each year, but outside of Hyatt stays, its 2x
  on dining and 1x on other purchases are modest. Consider this card if your
  business spending aligns with Hyatt stays and you're aiming for elite
  status, but weigh the reduced bonus if you're looking for immediate value.
