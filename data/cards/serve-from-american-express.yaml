our_take: >
  The Serve card from American Express is no longer accepting applications,
  which limits its availability for new users. With no annual fee, it was a
  low-cost option for those who managed to secure it before applications
  closed. However, without any recent changes or standout features that placed
  it on a Best-of list, it may not have been the most competitive card in its
  category. For those who already have it, the lack of an annual fee remains a
  small benefit, but potential users will need to consider alternative cards.
