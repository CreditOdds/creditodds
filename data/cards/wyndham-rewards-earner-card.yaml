our_take: >
  The Wyndham Rewards Earner card from Barclays is a strong choice for
  frequent travelers who favor Wyndham properties, offering 5 points per
  dollar spent at Hotels by Wyndham with no annual fee. The card also provides
  a generous signup bonus of up to 75,000 points, achievable by meeting two
  spending thresholds within the first six months. While it delivers solid
  rates of 2 points per dollar on dining, groceries, and gas, the real value
  lies in its travel perks, such as automatic Wyndham Rewards Gold status and
  a 10% points redemption discount on free nights. However, the regular APR is
  high, ranging from 19.24% to 29.99%, so it's best suited for those who plan
  to pay off their balance monthly. With no foreign transaction fees and an
  annual spend bonus, this card can be a valuable asset for loyal Wyndham
  guests.
