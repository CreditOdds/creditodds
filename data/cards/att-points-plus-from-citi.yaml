name: "AT&T Points Plus from Citi"
bank: "Citi"
slug: "att-points-plus-from-citi"
image: "citi-att-points-plus.png"
accepting_applications: true
apply_link: https://www.citi.com/credit-cards/citi-att-pointsplus-credit-card
foreign_transaction_fee: false
our_take: >
  This card really only makes sense if you are an AT&T customer: the $10/line
  wireless and $10 internet credits plus 2x on AT&T bills are where the value
  lives, alongside 3x on gas and 2x on groceries with no annual fee or foreign
  transaction fees. Cut the cord from AT&T and a flat 2% card earns more
  everywhere, so the whole pitch hinges on keeping those telecom bills.
annual_fee: 0
reward_type: "points"
tags:
  - rewards
rewards:
  - category: gas
    value: 3
    unit: points_per_dollar
    note: "Includes EV charging stations"
  - category: groceries
    value: 2
    unit: points_per_dollar
  - category: phone
    value: 2
    unit: points_per_dollar
    note: "AT&T products, services, and bill payments"
  - category: everything_else
    value: 1
    unit: points_per_dollar
signup_bonus:
  value: 200
  type: "cash"
  spend_requirement: 1000
  timeframe_months: 3
  note: "$250 statement credit after $500 spend in first 3 months"
benefits:
  - name: "AT&T Wireless Discount"
    value: 120
    description: "$10/line monthly discount on AT&T wireless bill (requires AutoPay and paperless billing)"
    frequency: "monthly"
    category: "telecom"
    enrollment_required: true
  - name: "AT&T Internet Credit"
    value: 120
    description: "$10 monthly discount on eligible AT&T internet bill (requires AutoPay and paperless billing)"
    frequency: "monthly"
    category: "telecom"
    enrollment_required: true
  - name: "Monthly Spend Statement Credit"
    value: 240
    description: "$10 statement credit after $500 spend or $20 after $1,000 spend per billing cycle, up to $240/year"
    frequency: "monthly"
    category: "statement_credit"
    enrollment_required: false
  - name: "No Foreign Transaction Fees"
    description: "No foreign transaction fees on purchases abroad"
    category: "travel"
    enrollment_required: false
  - name: "ThankYou Points Pooling"
    description: "Pool points with other Citi ThankYou cards to access transfer partners"
    category: "rewards"
    enrollment_required: false
