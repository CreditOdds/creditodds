our_take: >
  The Rakuten American Express card offers a compelling 5% cash back on
  Rakuten Dining purchases and 4% on Rakuten.com purchases, making it a strong
  choice for frequent Rakuten users. The card also provides a decent 2% back
  on groceries and dining, with 1% on everything else, all with no annual fee.
  A $200 signup bonus for spending $2,000 in the first three months adds
  further appeal. However, the rewards on non-Rakuten purchases are modest,
  and the high regular APR range of 19.49% to 28.49% could be a concern if you
  carry a balance. The 15-month 0% intro APR on purchases offers some
  breathing room for new cardholders, but the card's real value shines for
  those who can maximize the Rakuten-specific rewards.
