name: "Rakuten American Express"
bank: "American Express"
slug: "rakuten-american-express"
accepting_applications: true
apply_link: https://www.rakuten.com/american-express-card
# Checker-only: rakuten.com renders this card's page inside a cross-origin iframe
# served from rakuten.imprint.co (Imprint issues the card), so a fetch of
# apply_link strips to ~523 chars of accessibility boilerplate. Point the page
# check at the framed document directly; the Apply button still uses apply_link.
# NOTE: this path is a dated campaign slug and will rotate — when the check skips
# Rakuten with an HTTP 404, re-read the iframe src on apply_link and update it.
page_check_url: https://rakuten.imprint.co/cham-july-2026
category: "cashback"
image: "rakuten-american-express.png"
annual_fee: 0
tags:
  - cashback
  - shopping
  - dining
  - rewards
reward_type: "cashback"
rewards:
  - category: "rakuten"
    value: 4
    unit: "percent"
    note: "Rakuten.com purchases, up to $10,000 in spend per calendar year (then 1%); cap raised from $7,000 on July 15, 2026"
  - category: "rakuten_dining"
    value: 5
    unit: "percent"
    note: "Rakuten Dining purchases"
  - category: "groceries"
    value: 2
    unit: "percent"
  - category: "dining"
    value: 2
    unit: "percent"
  - category: "everything_else"
    value: 1
    unit: "percent"
signup_bonus:
  value: 200
  type: "cash"
  spend_requirement: 2000
  timeframe_months: 3
apr:
  regular:
    min: 19.74
    max: 33.99
foreign_transaction_fee: false
our_take: >
  This card is built for Rakuten loyalists: 4% on Rakuten.com (up to $10,000 a year)
  and 5% on Rakuten Dining stack on top of the usual cash-back portal, with a $200
  signup bonus, all for no annual fee.
  Off the Rakuten ecosystem the rates are ordinary (2% groceries and dining, 1% on
  everything else), so a flat 2% card like the Active Cash will beat it for general
  spending.
