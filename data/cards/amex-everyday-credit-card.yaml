our_take: >
  The Amex Everyday card is no longer accepting applications, so it won't be
  an option if you're looking to add a new card to your wallet. It previously
  offered a no-annual-fee structure with points-based rewards, which could
  have been appealing for those who prefer earning points over cash back.
  However, without the ability to apply, it's not a viable choice for new
  cardholders. If you already have the card, it's worth considering how its
  rewards align with your spending habits, but for new applicants, you'll need
  to explore other options.
