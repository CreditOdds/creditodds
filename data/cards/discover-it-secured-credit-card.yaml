our_take: >
  The Discover it Secured card stands out as the top choice in the secured
  card category, especially for those looking to build or rebuild their credit
  without an annual fee. It offers a rare combination of rewards and
  credit-building potential, with 2% cash back on gas and dining purchases up
  to $1,000 each quarter combined, and 1% on everything else. While the 10.99%
  intro APR on balance transfers for six months is a nice touch, the regular
  APR of 26.49% is on the higher side, so it's best to avoid carrying a
  balance. The card's real strength lies in its ability to help you establish
  a positive credit history while earning some cash back along the way. Just
  be mindful of the spending cap on the higher earn rate categories.
