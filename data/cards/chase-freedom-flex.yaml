name: "Chase Freedom Flex"
bank: "Chase"
slug: "chase-freedom-flex"
image: "freedom_flex_card.png"
accepting_applications: true
annual_fee: 0
tags:
  - cashback
  - rewards
reward_type: "cashback"
rewards:
  - category: "rotating"
    value: 5
    unit: "percent"
    mode: "quarterly_rotating"
    # Chase Travel (travel_portal) is a permanent 5% on this card, so it is
    # intentionally NOT listed here. Donations to United Way don't map to
    # a spending category, so they're kept in the umbrella note for context.
    current_categories:
      - category: "gas"
        note: "Gas stations (Q3 2026 rotation)"
      - category: "ev_charging"
        note: "EV charging (Q3 2026 rotation)"
      - category: "transit"
        note: "Public transit (Q3 2026 rotation)"
      - category: "entertainment"
        note: "Select live entertainment (Q3 2026 rotation)"
    current_period: "Q3 2026"
    note: "Q3 2026: gas stations and EV charging, public transit, select live entertainment, and donations to United Way"
    spend_cap: 1500
    cap_period: quarterly
    rate_after_cap: 1
  - category: "travel_portal"
    value: 5
    unit: "percent"
  - category: "dining"
    value: 3
    unit: "percent"
  - category: "drugstores"
    value: 3
    unit: "percent"
  - category: "everything_else"
    value: 1
    unit: "percent"
signup_bonus:
  value: 200
  type: cash
  spend_requirement: 500
  timeframe_months: 3
apr:
  purchase_intro:
    rate: 0
    months: 15
  balance_transfer_intro:
    rate: 0
    months: 15
  regular:
    min: 18.24
    max: 27.74
apply_link: https://creditcards.chase.com/cash-back-credit-cards/freedom/flex
foreign_transaction_fee: true
our_take: >
  The Freedom Flex is one of the strongest no-fee cash-back cards going: 5% on
  rotating quarterly categories (up to $1,500/quarter), a permanent 5% on Chase
  Travel, 3% on dining and drugstores, plus a $200 bonus and 15 months of 0%
  intro APR. The catches are activating the rotating categories each quarter and
  a foreign transaction fee that makes it a poor choice abroad. It shines most
  when paired with a Chase Sapphire so the points convert to transferable Ultimate
  Rewards; approvals here skew toward solid credit.
benefits:
  - name: "Cell Phone Protection"
    value: 1000
    description: "Up to $800 per claim and $1,000 per 12-month period in protection against covered theft or damage for cell phones listed on your monthly cell phone bill when paid with this card, maximum 2 claims per 12 months with $50 deductible per claim."
    frequency: "per_claim"
    category: "other"
    enrollment_required: false
