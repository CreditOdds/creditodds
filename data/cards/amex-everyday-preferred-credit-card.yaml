our_take: >
  The Amex Everyday Preferred card is no longer accepting applications, which
  means it's off the table for new cardholders. For those who already have it,
  the card offers a decent earn rate with 3x points at U.S. supermarkets on up
  to $6,000 per year and 2x points at U.S. gas stations, providing solid value
  for everyday spending. However, the $95 annual fee might be a sticking point
  if you're not maximizing these categories. Without any recent changes or
  features on Best-of lists, current cardholders should weigh the ongoing
  value of the rewards against the cost to determine if it still deserves a
  place in their wallet.
