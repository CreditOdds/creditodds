name: "Bilt Obsidian"
bank: "Bilt"
slug: "bilt-obsidian"
image: "bilt_obsidian.png"
accepting_applications: true
apply_link: https://www.biltrewards.com/card/apply
foreign_transaction_fee: false
annual_fee: 95
reward_type: "points"
release_date: "2025-01-15"
our_take: >
  This is the paid Bilt tier, justified mainly if you pay rent by card and value
  flexible Bilt points: you get fee-free rent payments, a choice of 3x dining or
  groceries, 2x travel, and a $100 annual hotel credit that nearly covers the $95
  fee. The free Bilt Mastercard already does fee-free rent, so the upgrade only
  pays off if you actually spend in the bonus categories and use the hotel credit.
  Outside of rent and the chosen 3x category, the earn rates are average.
benefits:
  - name: "Rent Payment Without Fees"
    value: 0
    description: "Pay rent with your credit card and earn points with no transaction fees"
    frequency: "ongoing"
    category: "other"
  - name: "Bilt Travel Hotel Credit"
    value: 100
    description: "Applied twice yearly as $50 statement credits for qualifying Bilt Travel Portal hotel bookings"
    frequency: "annual"
    category: "hotel"
    enrollment_required: false
tags:
  - rewards
  - travel
  - premium
rewards:
  - category: "selected_categories"
    value: 3
    unit: "points_per_dollar"
    choices: 1
    eligible_categories:
      - "dining"
      - "groceries"
    note: "Choose dining (default) or groceries as your 3x category annually (cap applies when groceries is selected)"
    spend_cap: 25000
    cap_period: annual
    rate_after_cap: 1
  - category: "hotels_portal"
    value: 4
    unit: "points_per_dollar"
    note: "Hotels booked through Bilt Travel"
  - category: "flights_portal"
    value: 3
    unit: "points_per_dollar"
    note: "Flights booked through Bilt Travel"
  - category: "travel"
    value: 2
    unit: "points_per_dollar"
  - category: "everything_else"
    value: 1
    unit: "points_per_dollar"
