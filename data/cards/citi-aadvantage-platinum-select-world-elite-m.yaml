    frequency: "ongoing"
    category: "travel"
  - name: "Preferred Boarding"
    value: 0
    description: "Preferred boarding on American Airlines flights"
    frequency: "ongoing"
    category: "travel"
  - name: "Inflight Purchase Discount"
    value: 25
    value_unit: "percent"
    description: "25% savings on inflight food and beverage purchases on American Airlines flights"
    frequency: "per_purchase"
    category: "dining"
    enrollment_required: false
