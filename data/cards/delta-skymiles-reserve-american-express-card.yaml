name: "Delta SkyMiles Reserve American Express"
bank: "American Express"
slug: "delta-skymiles-reserve-american-express-card"
image: "amex_delta_skymiles_reserve.png"
accepting_applications: true
apply_link: https://www.americanexpress.com/us/credit-cards/card/delta-skymiles-reserve-american-express-card/
foreign_transaction_fee: false
annual_fee: 650
reward_type: "miles"
our_take: >
  The Reserve is for frequent Delta flyers who want Sky Club access, the
  first-class companion certificate, and an MQD headstart toward Medallion status.
  Earning is thin outside Delta (3x on Delta, 1x elsewhere), so the $650 fee only
  makes sense if you use the Sky Clubs and the recurring Resy, Delta Stays, and
  rideshare credits. If you fly Delta less often, the $350 Platinum covers most of
  the same ground for far less.
benefits:
  - name: "Delta Sky Club Access"
    value: 0
    description: "15 Delta Sky Club visits per Medallion Year when flying Delta, with unlimited visits after $75,000 in purchases in a calendar year"
    frequency: "ongoing"
    category: "lounge"
  - name: "Centurion Lounge Access"
    value: 0
    description: "Complimentary access to The Centurion Lounge when your Delta flight is booked with the Reserve card"
    frequency: "ongoing"
    category: "lounge"
  - name: "Companion Certificate"
    value: 0
    description: "Companion certificate issued each year after Card renewal, no spend requirement, valid for a Delta First, Premium Select, Comfort, or Main round-trip flight within the U.S. and to Mexico, the Caribbean, or Central America"
    frequency: "annual"
    category: "travel"
  - name: "Global Entry / TSA PreCheck Credit"
    value: 120
    description: "Statement credit every 4 years for the $120 Global Entry application fee or up to $85 for TSA PreCheck"
    frequency: "multi_year"
    frequency_years: 4
    category: "security"
  - name: "TakeOff 15"
    value: 0
    description: "15% off Delta award flights when booking through delta.com or the Fly Delta app"
    frequency: "ongoing"
    category: "travel"
  - name: "MQD Headstart"
    value: 0
    description: "$2,500 Medallion Qualification Dollars (MQD) headstart each Medallion Qualification Year, applied toward Delta elite status qualification"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "MQD Boost"
    value: 0
    description: "Earn $1 Medallion Qualification Dollar for every $10 in eligible purchases on the card"
    frequency: "ongoing"
    category: "travel"
    enrollment_required: false
  - name: "Resy Dining Credit"
    value: 240
    description: "Up to $20 in statement credits each month for dining at U.S. Resy restaurants"
    frequency: "annual"
    category: "dining"
    enrollment_required: true
  - name: "Delta Stays Hotel Credit"
    value: 200
    description: "Annual statement credit for prepaid hotels or vacation rentals booked through Delta Stays"
    frequency: "annual"
    category: "hotel"
    enrollment_required: false
  - name: "Rideshare Credit"
    value: 120
    description: "Up to $10 in statement credits each month for U.S. rideshare purchases with select providers."
    frequency: "annual"
    category: "rideshare"
    enrollment_required: true
  - name: "Inflight Purchase Rebate"
    value: 20
    value_unit: "percent"
    description: "20% statement credit on eligible Delta inflight food and beverage purchases."
    frequency: "per_purchase"
    category: "statement_credit"
    enrollment_required: false
