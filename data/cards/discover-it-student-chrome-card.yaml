our_take: >
  The Discover it Student Chrome card offers a solid entry point for students
  looking to build credit while earning some cash back. With no annual fee and
  2% cash back on gas and dining up to $1,000 per quarter combined, it
  provides a decent return on everyday spending. The card also features a 0%
  intro APR for 6 months on purchases and 18 months on balance transfers,
  which can be helpful for managing initial expenses or transferring existing
  balances. However, the 1% cash back on all other purchases is fairly
  standard, so it's best used in conjunction with other cards if you're
  looking for higher rewards on non-gas and dining purchases. The absence of
  foreign transaction fees is a nice perk for students who may travel abroad.
