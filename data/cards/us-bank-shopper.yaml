name: "US Bank Shopper Cash Rewards"
bank: "U.S. Bank"
slug: "us-bank-shopper"
image: "us-bank-shopper.png"
accepting_applications: true
annual_fee: 95
annual_fee_intro:
  value: 0
  months: 12
tags:
  - cashback
  - shopping
reward_type: "cashback"
rewards:
  - category: online_shopping
    value: 6
    unit: percent
    mode: user_choice
    choices: 2
    note: "Choose 2 retailers each quarter (Amazon, Apple, Costco, Target, Walmart, etc.), up to $1,500 combined. Earns at chosen retailers in-store, online, or by phone — not generic online shopping."
    spend_cap: 1500
    cap_period: quarterly
    rate_after_cap: 1.5
    # Bonus is gated to a fixed list of partner retailers chosen quarterly,
    # NOT generic online shopping. Excluded from category matching so the
    # card doesn't falsely surface for arbitrary online stores. We surface
    # it via `also_earns` on the specific stores where it actually applies.
    merchant_specific: true
  - category: selected_categories
    value: 3
    unit: percent
    choices: 1
    eligible_categories: [gas, wholesale_clubs, utilities]
    note: "Choose 1 everyday category each quarter, up to $1,500"
  - category: hotels_car_portal
    value: 5.5
    unit: percent
    note: "Hotel and car reservations booked in the Travel Center"
  - category: everything_else
    value: 1.5
    unit: percent
signup_bonus:
  value: 250
  type: cash
  spend_requirement: 2000
  timeframe_months: 4
apr:
  regular:
    min: 18.74
    max: 28.74
benefits:
  - name: "First-Year Annual Fee Waiver"
    value: 95
    description: "$0 annual fee for the first year, then $95"
    frequency: "one_time"
    category: "rewards"
    enrollment_required: false
  - name: "Cell Phone Protection"
    value: 0
    description: "Up to $600 per claim ($25 deductible, 2 claims per 12 months) when you pay your monthly cell phone bill with the card"
    frequency: "per_claim"
    category: "telecom"
    enrollment_required: false
our_take: >
  The U.S. Bank Shopper Cash Rewards card shines for frequent shoppers,
  offering 6% cash back at your choice of two major retailers each quarter,
  like Amazon and Target, on up to $1,500 in combined spending. This makes it
  a strong contender for those who can maximize these quarterly categories.
  The card also offers 3% back in one everyday category of your choice, such
  as gas or utilities, and 5.5% on travel booked through their portal. The
  $250 signup bonus after spending $2,000 in the first four months is a nice
  boost, especially with no annual fee for the first year. However, the $95
  annual fee kicks in after that, and the foreign transaction fee makes it
  less ideal for international use. Overall, it's a great card for strategic
  spenders who can take full advantage of the rotating categories.
apply_link: https://www.usbank.com/credit-cards/shopper-cash-rewards-visa-signature-credit-card.html
foreign_transaction_fee: true
