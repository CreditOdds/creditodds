name: "Blue Cash Preferred"
bank: "American Express"
slug: "blue-cash-preferred-card"
image: "amex_blue_cash_preferred.png"
accepting_applications: true
apply_link: https://www.americanexpress.com/us/credit-cards/card/blue-cash-preferred/
foreign_transaction_fee: true
our_take: >
  The Blue Cash Preferred card from American Express is a standout for
  families and frequent shoppers, offering an impressive 6% cash back on up to
  $6,000 spent annually at U.S. supermarkets, then 1%, and on select U.S.
  streaming subscriptions. The recent boost to a $300 signup bonus when you
  spend $3,000 in the first 6 months sweetens the deal. It also provides 3%
  back on transit and U.S. gas stations, making it a versatile option for
  everyday expenses. However, the $95 annual fee and foreign transaction fees
  are worth considering, especially if you travel abroad. The card's 12-month
  0% intro APR on purchases can help manage large expenses, but the regular
  APR can climb as high as 28.49%. Additional perks like the Disney Bundle
  discount and purchase protection add value, but ensure they align with your
  spending habits.
annual_fee: 95
reward_type: "cashback"
rewards:
  - category: groceries
    value: 6
    unit: percent
    note: "U.S. supermarkets"
    spend_cap: 6000
    cap_period: annual
    rate_after_cap: 1
  - category: streaming
    value: 6
    unit: percent
    note: "Select U.S. streaming subscriptions"
  - category: transit
    value: 3
    unit: percent
    note: "Including taxis, rideshare, parking, tolls, trains, buses"
  - category: gas
    value: 3
    unit: percent
    note: "U.S. gas stations"
  - category: everything_else
    value: 1
    unit: percent
signup_bonus:
  value: 300
  type: "cash"
  spend_requirement: 3000
  timeframe_months: 6
apr:
  purchase_intro:
    rate: 0
    months: 12
  balance_transfer_intro:
    rate: 0
    months: 12
    note: "0% intro APR for 12 months on balance transfers requested within 60 days of account opening"
  regular:
    min: 19.49
    max: 28.49
benefits:
  - name: "Disney Bundle Discount"
    value: 84
    description: "$7/month statement credit toward the Disney Bundle (Disney+, Hulu, ESPN+)"
    frequency: "monthly"
    category: "streaming"
    enrollment_required: true
    merchants:
      - disney-plus
      - hulu
      - espn-plus
  - name: "Purchase Protection"
    description: "Coverage up to $1,000 per covered purchase and $50,000 per account per calendar year if a charged item is stolen or accidentally damaged within 90 days"
    category: "protection"
    enrollment_required: false
  - name: "Return Protection"
    description: "Return eligible purchases to American Express for refund if the seller won't accept returns, up to $300 per item and $1,000 per calendar year"
    category: "protection"
    enrollment_required: false
  - name: "Extended Warranty"
    description: "Up to one extra year added to the original manufacturer's warranty on covered purchases (up to $10,000 per item, $50,000 per account per calendar year)"
    category: "protection"
    enrollment_required: false
