name: "Delta SkyMiles Platinum American Express"
bank: "American Express"
slug: "delta-skymiles-platinum-american-express-card"
image: "amex_delta_skymiles_platinum.png"
accepting_applications: true
apply_link: https://www.americanexpress.com/us/credit-cards/card/delta-skymiles-platinum-american-express-card/
foreign_transaction_fee: false
our_take: >
  This one earns its keep through perks, not its earn rates: the annual Main
  Cabin companion certificate alone can offset most of the $350 fee, and you
  also get a free first checked bag and a stack of monthly credits for
  rideshare, dining, and Delta Stays. The 3x on Delta and 2x on dining and
  groceries is fine but not the draw. It only makes sense if you fly Delta
  regularly and will actually redeem the companion pass and credits, otherwise
  the cheaper Delta Gold covers most casual flyers.
annual_fee: 350
reward_type: "miles"
benefits:
  - name: "Companion Certificate"
    value: 0
    description: "Annual domestic Main Cabin companion certificate after meeting spend requirements"
    frequency: "annual"
    category: "travel"
  - name: "Global Entry / TSA PreCheck Credit"
    value: 100
    description: "Up to $100 statement credit for Global Entry or TSA PreCheck application fee"
    frequency: "multi_year"
    frequency_years: 5
    category: "security"
  - name: "TakeOff 15"
    value: 0
    description: "15% off Delta award flights when booking through delta.com or the Fly Delta app"
    frequency: "ongoing"
    category: "travel"
  - name: "First Checked Bag Free"
    value: 0
    description: "First checked bag free on Delta flights for you and up to 8 companions on the same reservation"
    frequency: "ongoing"
    category: "travel"
  - name: "MQD Headstart"
    value: 0
    description: "$2,500 Medallion Qualification Dollars (MQD) headstart each Medallion Qualification Year, applied toward Delta elite status qualification"
    frequency: "annual"
    category: "travel"
    enrollment_required: false
  - name: "Rideshare Credit"
    value: 120
    description: "Earn up to $10 in statement credits each month after using card on U.S. rideshare purchases with select providers"
    frequency: "annual"
    category: "rideshare"
    enrollment_required: true
  - name: "Delta Stays Credit"
    value: 150
    description: "Annual statement credit after using card to book prepaid hotels or vacation rentals through Delta Stays on delta.com"
    frequency: "annual"
    category: "hotel"
    enrollment_required: false
  - name: "Resy Dining Credit"
    value: 120
    description: "Earn up to $10 in statement credits each month at qualifying U.S. Resy restaurants"
    frequency: "annual"
    category: "dining"
    enrollment_required: true
  - name: "In-Flight Purchase Rebate"
    value: 20
    value_unit: "percent"
    description: "20% statement credit on eligible Delta in-flight food and beverage purchases"
    frequency: "per_purchase"
    category: "dining"
    enrollment_required: false
