our_take: >
  The Hotels.com Rewards Visa from Wells Fargo is no longer accepting
  applications, so it won't be an option for new cardholders looking to earn
  rewards through Hotels.com. With no annual fee, it was previously a
  straightforward choice for those who frequently booked hotels through the
  platform and wanted to earn rewards without additional costs. However, since
  it's not available to new applicants, current cardholders might still
  benefit from any existing rewards structure, but new users will need to look
  elsewhere for similar travel-related benefits.
