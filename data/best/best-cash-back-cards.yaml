intro: |
  Cash back cards are the simplest way to earn rewards — no points to transfer, no portals to navigate, just money back on your spending. We've ranked the best options based on signup bonus value and ease of earning it, ongoing cash back rates across categories, and whether any annual fee is justified by the rewards you'll actually earn.

