intro: |
  Cash back cards are the simplest way to earn rewards — no points to transfer, no portals to navigate, just money back on your spending. We've ranked the best options based on signup bonus value, ongoing earning rates, and whether the rewards justify any annual fee.

cards:
  - slug: chase-freedom-flex
    badge: Best Overall
    highlight: 5% cash back on rotating quarterly categories and Chase Travel, 3% on dining and drugstores, plus 1% on everything else. Earn a $200 bonus after just $500 in spending with no annual fee.

  - slug: chase-freedom-unlimited
    highlight: 1.5% cash back on everything plus 3% on dining and drugstores, 5% on Chase Travel. Get a $250 signup bonus after $500 in spending with no annual fee.

  - slug: wells-fargo-active-cash
    badge: Best Flat Rate
    highlight: A simple 2% cash back on every purchase with no annual fee and no spending caps. Earn a $200 bonus after $500 in spending.

  - slug: citi-double-cash
    highlight: 2% cash back on everything — 1% when you buy, 1% when you pay — with no annual fee. Earn a $200 bonus after $1,500 in 6 months.

  - slug: citi-custom-cash
    badge: Best Category Card
    highlight: 5% back on your highest spending category each month (capped at $500/month) from dining, gas, groceries, transit, streaming, and more, automatically switching as your spending patterns change. No annual fee.

  - slug: capital-one-savorone
    highlight: 3% cash back on dining, groceries, entertainment, and streaming, plus 1% on everything else. Earn a $200 bonus after $500 in spending, but note the $39 annual fee.

  - slug: discover-it-cash-back
    badge: Best First-Year Value
    highlight: 5% on rotating quarterly categories and 1% on everything else, with Discover matching all cash back earned in your first year — effectively doubling rewards to 10% and 2%. No annual fee.

  - slug: blue-cash-everyday-card
    highlight: 3% at U.S. supermarkets (up to $6,000/year), 3% on gas, and 3% on online shopping, plus 1% elsewhere. Earn a $200 bonus after $2,000 in 6 months with no annual fee.

  - slug: amazon-prime-rewards-visa-signature-card
    highlight: 5% back at Amazon, Whole Foods, and Chase Travel for Prime members, plus 2% on dining, gas, and transit. Get a $150 bonus with no signup spend requirement.

  - slug: capital-one-quicksilver
    highlight: 1.5% cash back on everything with no annual fee, no rotating categories, and no spending caps. Earn a $200 bonus after $500 in spending.

  - slug: wells-fargo-autograph
    highlight: 3x points on dining, travel, gas, transit, and streaming (effectively 3% cash back), plus 1x on everything else. Get a 20,000-point bonus ($200 value) after $1,000 in 3 months with no annual fee.

  - slug: wells-fargo-signify-business-cash
    highlight: 2% cash back on all business purchases with no annual fee. Earn a $500 signup bonus after $5,000 in 3 months — the highest flat bonus available.

  - slug: wells-fargo-attune
    highlight: 4% cash back on lifestyle categories including fitness, wellness, sports, live events, pet supplies, transit, and EV charging, plus 1% on everything else. Earn a $100 bonus after $500 in spending with no annual fee.
