#
# #1 chase-freedom-flex (Best Overall)
#   This card delivers the best combination of signup bonus attainability,
#   category rewards, and no annual fee. The $200 bonus requires only $500
#   spending, and the 5% rotating categories plus 3% dining/drugstores
#   coverage makes it superior to flat-rate competitors for everyday earning.
#
# #2 discover-it-cash-back (Best First-Year Value)
#   The first-year match benefit is unmatched in the market, effectively
#   doubling earning rates for 12 months. Combined with no signup minimum, no
#   annual fee, and strong baseline 5% rotating category rate, this card
#   provides exceptional value for those prioritizing first-year rewards.
#
# #3 chase-freedom-unlimited (Best for Everyday Spending)
#   This card is ideal for people who want simplicity and consistent rewards
#   everywhere without tracking rotating categories. The 1.5% baseline on all
#   purchases beats most flat-rate competitors, and the $200 bonus is easily
#   attainable, making it stronger than Category 4 flat-rate options.
#
# #4 wells-fargo-active-cash (Best Flat Rate)
#   The 2% flat rate on all spending is the highest no-fee, no-category option
#   available and appeals to those who prioritize simplicity. The $200 bonus
#   is easy to earn, making this a solid alternative to Chase Freedom
#   Unlimited for people who prefer straightforward earning without category
#   management.
#
# #5 citi-double-cash
#   This card matches Wells Fargo Active Cash on flat 2% earning and adds
#   balance transfer flexibility with an 18-month intro APR. The higher $1,500
#   spend requirement and longer earning timeline make it less attractive for
#   signup bonus value, but it ranks above cards with lower earning rates.
#
# #6 citi-custom-cash
#   The flexible 5% category selection is valuable for people with variable
#   spending, though the $500/month cap limits upside compared to rotating
#   categories. The higher $1,500 spend requirement and longer earning
#   timeline reduce its competitive position versus Chase Freedom Flex.
#
# #7 blue-cash-everyday-card
#   Strong category coverage for groceries, gas, and online shopping makes
#   this appealing for structured spenders, but the 3% rate is lower than
#   Chase Freedom Flex's 5% rotating categories. The higher $2,000 spend
#   requirement also makes the bonus less attainable than top-ranked
#   competitors.
#
# #8 amazon-prime-rewards-visa-signature-card
#   This card is best for Amazon-focused spenders and Prime members, but the
#   $150 no-spend bonus is lower value than competitors' bonuses, and it lacks
#   the broader earning power of multi-category cards for non-Amazon spending.
#   It ranks higher than less flexible, lower-earning alternatives.
#
# #9 wells-fargo-autograph
#   Solid 3% coverage across popular spending categories and a reasonable
#   bonus make this competitive, but the rates don't exceed Chase Freedom
#   Flex's 5% rotating categories. The $1,000 spend requirement is higher than
#   top competitors, and Wells Fargo points are less flexible than cash back.
#
# #10 wells-fargo-attune
#   The 4% rate applies to niche categories that don't fit most people's
#   primary spending, and the $100 bonus is the lowest on the list. While
#   useful for people with specific wellness interests, it underperforms
#   broader-category cards for the typical cash back user.
#
# #11 capital-one-savorone
#   The $39 annual fee is difficult to justify against no-fee alternatives
#   like Chase Freedom Flex and Blue Cash Everyday, which offer equal or
#   superior category coverage. Even the $200 bonus doesn't offset the annual
#   cost for most users compared to fee-free competitors.
#
# #12 wells-fargo-signify-business-cash
#   The $500 bonus is the highest on the list, but it requires $5,000 spending
#   over 3 months, making it less accessible than consumer cards with lower
#   thresholds. Additionally, this is a business card and doesn't fit the
#   consumer cash back category focus, though the bonus value is strong.
#
# #13 capital-one-quicksilver
#   Kept from previous ranking (not included in AI response).
#
