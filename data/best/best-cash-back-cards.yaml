#
# #8 wells-fargo-autograph  [Claude #10, GPT #10, Gemini #7]
#   Autograph offers strong category coverage and a high signup bonus, but
#   earns points rather than cash back. This requires a redemption strategy to
#   convert points to cash value, making it less straightforward than
