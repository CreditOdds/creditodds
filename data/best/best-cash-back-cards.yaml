intro: |
  Cash back cards offer the simplest way to earn rewards — direct cash with no points to transfer or portals to navigate. We've ranked the best options based on signup bonus value and ease of earning it, ongoing cash back rates, and whether any annual fee is justified by the rewards you'll actually earn.

cards:
  - slug: chase-freedom-flex
    badge: Best Overall
    highlight: Earn $200 cash back after just $500 in spending, then enjoy 5% back on rotating quarterly categories and Chase Travel, 3% on dining and drugstores, and 1% on everything else—all with no annual fee and a 15-month intro APR on purchases.

  - slug: discover-it-cash-back
    badge: Best First Year
    highlight: Earn 5% cash back on rotating quarterly categories and 1% on everything else, with Discover matching all cash back earned in your first year to effectively double your rewards. No annual fee, no signup minimum, and 15-month intro APR on purchases.

  - slug: chase-freedom-unlimited
    badge: Best for Everyday Spending
    highlight: Earn $200 cash back after $500 in spending, then get 1.5% back on all purchases plus 3% on dining and drugstores and 5% on Chase Travel—with no annual fee and 15-month intro APR on purchases and balance transfers.

  - slug: wells-fargo-active-cash
    badge: Best Flat Rate
    highlight: Get 2% cash back on every purchase with no annual fee, no spending caps, and no categories to track. Earn a $200 bonus after $500 in spending.

  - slug: citi-double-cash
    highlight: Earn 2% cash back on all purchases through a unique 1%-on-purchase, 1%-on-payment structure, plus 5% on Chase Travel. Get a $200 bonus after $1,500 in 6 months with no annual fee and 18-month intro APR on balance transfers.

  - slug: blue-cash-everyday-card
    previous_rank: 7
    highlight: Earn 3% cash back at U.S. supermarkets (up to $6,000 yearly), 3% on gas, 3% on online shopping, and 1% elsewhere. Get a $200 bonus after $2,000 in 6 months with no annual fee.

  - slug: citi-custom-cash
    previous_rank: 6
    highlight: Earn 5% cash back on your highest spending category each month (from dining, gas, groceries, transit, streaming, and more, capped at $500/month) plus 1% elsewhere. Get a $200 bonus after $1,500 in 6 months with no annual fee.

  - slug: amazon-prime-rewards-visa-signature-card
    highlight: Earn 5% cash back at Amazon and Whole Foods (for Prime members), 5% on Chase Travel, 2% on dining, gas, and transit, and 1% elsewhere. Get a $150 bonus with no spending requirement.

  - slug: wells-fargo-autograph
    highlight: Earn 3% cash back on dining, travel, gas, transit, and streaming, plus 1% elsewhere. Get a $200 equivalent bonus (20,000 points) after $1,000 in 3 months with no annual fee.

  - slug: wells-fargo-attune
    highlight: Earn 4% cash back on fitness, wellness, sports, live events, pet supplies, transit, and EV charging, plus 1% elsewhere. Get a $100 bonus after $500 in spending with no annual fee.

  - slug: capital-one-savorone
    highlight: Earn 3% cash back on dining, groceries, entertainment, and streaming, plus 1% elsewhere. Get a $200 bonus after $500 in spending, but includes a $39 annual fee.

  - slug: wells-fargo-signify-business-cash
    highlight: Earn 2% cash back on all business purchases with no annual fee and no spending caps. Get a $500 bonus after $5,000 in 3 months—the highest flat bonus available.

  - slug: capital-one-quicksilver
    highlight: 1.5% cash back on everything with no annual fee, no rotating categories, and no spending caps. Earn a $200 bonus after $500 in spending.
