intro: |
  Cash back cards are the simplest way to earn rewards — no points to transfer, no portals to navigate, just money back on your spending. We've ranked the best options based on signup bonus value and ease of earning it, ongoing cash back rates across categories, and whether any annual fee is justified by the rewards you'll actually earn.

cards:
  - slug: chase-freedom-flex
    badge: Best Overall
    highlight: 5% cash back on rotating quarterly categories and Chase Travel, 3% on dining and drugstores, 1% on everything else. Earn a $200 bonus after just $500 in spending with no annual fee.

  - slug: discover-it-cash-back
    badge: Best First-Year Value
    previous_rank: 7
    highlight: 5% on rotating quarterly categories and 1% on everything else, with Discover matching all cash back in your first year — effectively doubling to 10% and 2%. No annual fee and no signup minimum.

  - slug: wells-fargo-active-cash
    badge: Best Flat Rate
    highlight: 2% cash back on every purchase with no annual fee, no spending caps, and no categories to track. Earn a $200 bonus after $500 in spending.

  - slug: chase-freedom-unlimited
    previous_rank: 2
    highlight: 1.5% cash back on everything plus 3% on dining and drugstores, 5% on Chase Travel. Earn a $250 bonus after $500 in spending with no annual fee.

  - slug: citi-double-cash
    previous_rank: 4
    highlight: 2% cash back on everything with a unique 1%-on-purchase, 1%-on-payment structure and no annual fee. Earn a $200 bonus after $1,500 in 6 months.

  - slug: citi-custom-cash
    badge: Best Category Card
    previous_rank: 5
    highlight: 5% back on your highest spending category each month (capped at $500/month) from dining, gas, groceries, transit, streaming, and more, 1% elsewhere. Earn a $200 bonus after $1,500 in 6 months with no annual fee.

  - slug: blue-cash-everyday-card
    previous_rank: 8
    highlight: 3% at U.S. supermarkets (up to $6,000/year), 3% on gas, 3% on online shopping, 1% elsewhere. Earn a $200 bonus after $2,000 in 6 months with no annual fee.

  - slug: amazon-prime-rewards-visa-signature-card
    previous_rank: 9
    highlight: 5% back at Amazon and Whole Foods for Prime members, 5% on Chase Travel, 2% on dining, gas, and transit, 1% elsewhere. Earn a $150 bonus with no spend requirement.

  - slug: wells-fargo-autograph
    previous_rank: 11
    highlight: 3% cash back (via points) on dining, travel, gas, transit, and streaming, 1% on everything else. Earn a 20,000-point bonus ($200 value) after $1,000 in 3 months with no annual fee.

  - slug: capital-one-savorone
    previous_rank: 6
    highlight: 3% cash back on dining, groceries, entertainment, and streaming, 1% on everything else. Earn a $200 bonus after $500 in spending, with a $39 annual fee.

  - slug: wells-fargo-attune
    previous_rank: 13
    highlight: 4% cash back on fitness, wellness, sports, live events, pet supplies, transit, and EV charging, 1% on everything else. Earn a $100 bonus after $500 in spending with no annual fee.

  - slug: wells-fargo-signify-business-cash
    highlight: 2% cash back on all business purchases with no annual fee and no spending caps. Earn a $500 bonus after $5,000 in 3 months — the highest flat bonus available.

  - slug: capital-one-quicksilver
    previous_rank: 10
    highlight: 1.5% cash back on everything with no annual fee, no rotating categories, and no spending caps. Earn a $200 bonus after $500 in spending.
