intro: |
  Cash back cards are the simplest way to earn rewards — no points to transfer, no portals to navigate, just money back on your spending. We've ranked the best options based on signup bonus value and ease of earning it, ongoing cash back rates across categories, and whether any annual fee is justified by the rewards you'll actually earn.

cards:
  - slug: chase-freedom-flex
    badge: Best Overall
    highlight: 5% cash back on rotating quarterly categories and Chase Travel, 3% on dining and drugstores, 1% on everything else. Earn a $200 bonus after just $500 in spending with no annual fee and 15-month intro APR on purchases.

  - slug: discover-it-cash-back
    badge: Best First-Year Value
    previous_rank: 3
    highlight: 5% cash back on rotating quarterly categories and 1% on everything else, with Discover matching all cash back in your first year—effectively doubling to 10% and 2%. No annual fee, no signup minimum, and 15-month intro APR on purchases.

  - slug: chase-freedom-unlimited
    badge: Best for Everyday Spending
    previous_rank: 2
    highlight: 1.5% cash back on everything, plus 3% on dining and drugstores, and 5% on Chase Travel. Earn a $200 bonus after $500 in spending with no annual fee and 15-month intro APR on purchases and balance transfers.

  - slug: wells-fargo-active-cash
    badge: Best Flat Rate
    highlight: 2% cash back on every purchase with no annual fee, no spending caps, and no categories to track. Earn a $200 bonus after $500 in spending.

  - slug: citi-double-cash
    previous_rank: 6
    highlight: 2% cash back on everything with a unique 1%-on-purchase, 1%-on-payment structure and no annual fee. Earn a $200 bonus after $1,500 in 6 months, with 18-month intro APR on balance transfers.

