intro: |
  Signup bonuses are the fastest way to earn valuable rewards from a new credit card. We've ranked the best offers available right now based on bonus value, spending requirements, annual fee efficiency, and ongoing rewards—helping you find the best option whether you prioritize points, miles, or cash back.

cards:
  - slug: the-platinum-card
    badge: Best Overall
    highlight: 175,000 Membership Rewards points after $12,000 in 6 months — worth roughly $3,500 when transferred to airline and hotel partners. This is the highest-value signup bonus available by a significant margin, and 5x earning on airfare and hotels makes it excellent for premium travel spending.

  - slug: chase-sapphire-reserve
    badge: Best Premium Travel
    highlight: 150,000 Ultimate Rewards points after $6,000 in 3 months — worth up to $2,250 through Chase Travel. The $300 annual travel credit significantly offsets the $795 fee, and 8x points on Chase Travel portal bookings provide excellent ongoing value.

  - slug: american-express-gold-card
    badge: Best Value
    highlight: 100,000 Membership Rewards points after $8,000 in 6 months — worth roughly $2,000 when transferred to airline and hotel partners. The 4x earning on dining and groceries combined with the reasonable $325 annual fee makes this excellent for everyday spending beyond the signup bonus.

  - slug: chase-sapphire-preferred
    badge: Best Mid-Tier Travel
    previous_rank: 6
    highlight: 100,000 Ultimate Rewards points after $5,000 in 3 months, worth at least $1,500 through Chase Travel. The $95 annual fee is minimal, and transfer-friendly points with 5x on the travel portal make this an excellent value for casual to moderate travelers.

  - slug: chase-ink-business-preferred
    badge: Best Business Card
    previous_rank: 4
    highlight: 100,000 Ultimate Rewards points after $8,000 in 3 months — worth up to $1,500 through Chase Travel. At just $95 annual fee, this delivers one of the best business card values with flexible transfer-friendly rewards.

  - slug: capital-one-venture-x
    previous_rank: 5
    highlight: 75,000 miles after $4,000 in 3 months, plus $300 annual travel credit and 10,000 anniversary miles. The effective annual cost drops to just $95 after travel credits, and 10x earning on hotel and car bookings through the portal delivers strong ongoing value.

  - slug: ihg-rewards-club-premier-credit-card
    previous_rank: 8
    highlight: 185,000 IHG points after $6,000 in 6 months, worth roughly $925 in hotel stays. The $99 annual fee is reasonable, and 26x earning at IHG properties delivers exceptional value for IHG-focused hotel loyalty members.

  - slug: world-of-hyatt-business-credit-card
    badge: Best Hotel Value
    previous_rank: 7
    highlight: 60,000 World of Hyatt points after $5,000 in 3 months — worth $1,200+ in hotel stays at roughly 2 cents per point. Hyatt points consistently offer the highest redemption value among hotel loyalty programs.

  - slug: ihg-rewards-premier-business
    highlight: 200,000 IHG points after $9,000 in 6 months, worth roughly $1,000 in hotel stays. The $99 annual fee and 26x earning at IHG properties make this competitive for business travelers seeking hotel rewards.

  - slug: delta-skymiles-platinum-american-express-card
    previous_rank: 11
    highlight: 100,000 SkyMiles after $6,000 in 6 months, plus a companion certificate and 3x earning on airlines and hotels. The $350 annual fee makes this a mid-tier option for Delta-focused travelers.

  - slug: delta-skymiles-reserve-american-express-card
    previous_rank: 10
    highlight: 125,000 Delta SkyMiles after $9,000 in 6 months, plus Delta Sky Club access and a companion certificate. The $650 annual fee is justified for frequent Delta flyers with strong perks including elite earning.

  - slug: delta-skymiles-gold-american-express-card
    badge: Best for Beginners
    highlight: 90,000 SkyMiles after $5,000 in 6 months, with only a $150 annual fee. This is the most affordable entry point into the Delta ecosystem for casual and emerging flyers.

  - slug: united-quest
    highlight: 60,000 United miles after $4,000 in 3 months, plus two free checked bags annually and 25% back on United award flights. The $350 annual fee is best suited for frequent United travelers.

  - slug: chase-freedom-flex
    badge: Best No-Fee Card
    previous_rank: 15
    highlight: $200 cash back after just $500 in spending — one of the easiest bonuses to earn. Zero annual fee with 5% rotating categories, 5% on Chase Travel portal, and 3% on dining and drugstores.

  - slug: wells-fargo-active-cash
    previous_rank: 16
    highlight: $200 cash back after $500 in 3 months with zero annual fee. Straightforward 2% cash back on all purchases plus 12-month 0% APR on purchases and balance transfers.

  - slug: wells-fargo-signify-business-cash
    badge: Best Cash Back
    previous_rank: 14
    highlight: $500 cash back after $5,000 in 3 months with zero annual fee. Simple 2% flat cash back on all business purchases with no categories to track.

  - slug: capital-one-savorone
    highlight: $200 cash back after $500 in 3 months with a $39 annual fee. Offers 3% on dining, entertainment, streaming, and groceries with 1% on everything else.
