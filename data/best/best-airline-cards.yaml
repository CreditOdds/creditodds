# ============================================================
# Best Airline Credit Cards — Ranking Reasoning (2026-03-31)
# ============================================================
#
# #1 citi-aadvantage-platinum-select-world-elite-m (Best Overall Value)
#   This card delivers the strongest value proposition on the list: an
#   80,000-mile bonus with a low $3,500 spend requirement, minimal $99 annual
#   fee, and versatile 2x earning across multiple categories beyond just
#   airline purchases. The combination of attainable bonus, low fee, and broad
#   earning makes it the best entry point for most airline loyalty seekers.
#
# #2 united-gateway (Best No-Fee)
#   For travelers unwilling to pay annual fees, this is the clear winner: a
#   solid 30,000-mile bonus with no fee, 12 months of 0% APR, and 2x earning
#   on three practical categories. The free checked bag on United flights adds
#   tangible value that justifies the lower bonus compared to paid
#   alternatives.
#
# #3 delta-skymiles-gold-american-express-card (Best Mid-Tier)
#   This card sits at the sweet spot between low-fee and premium tiers: the
#   90,000-mile bonus is substantial, the $150 fee is reasonable, and the 2x
#   earning on three everyday categories (dining, groceries, airlines) makes
#   it more versatile than entry-level cards. It's a natural upgrade path for
#   Delta loyalists.
#
# #4 jetblue-plus-card
#   JetBlue Plus offers exceptional earning rates (6x on airline purchases is
#   among the highest on the list) at a modest $99 annual fee, plus strong
#   perks like checked bag and inflight discounts. The low $1,000 spend
#   requirement makes the bonus highly attainable despite shorter earning
#   window.
#
# #5 southwest-rapid-rewards-plus-credit-card
#   Southwest Plus delivers an accessible entry point with the lowest spend
#   requirement ($1,000) on the page at a $99 fee. While the bonus is modest,
#   the combination of 2x earning categories and anniversary bonus progress
#   toward Southwest's valuable Companion Pass makes it appealing for
#   Southwest-focused travelers.
#
# #6 united-explorer
#   United Explorer offers a balanced package with a solid 70,000-mile bonus,
#   reasonable $150 fee, and versatile 2x earning across travel and dining.
#   Two United Club passes add value, though the card is somewhat outpaced by
#   stronger recent offers from competitors.
#
# #7 delta-skymiles-platinum-american-express-card
#   The Platinum offers a premium 100,000-mile bonus plus companion
#   certificate for $350/year with solid 3x/2x earning structure across four
#   categories. It's a strong step up from the Gold for committed Delta
#   flyers, though the higher fee and longer spend window require more
#   spending commitment.
#
# #8 british-airways-visa-signature-card
#   This card offers excellent value for oneworld alliance travelers: the $95
#   fee is among the lowest for a 75,000-point bonus, and Avios are highly
#   valuable for short-haul redemptions on American and oneworld partners. The
#   3x earning on multiple airline partners makes it versatile within the
#   alliance.
#
# #9 hawaiian-airlines-world-elite-mastercard
#   Hawaiian Airlines card stands out for Hawaii-focused travelers with strong
#   3x/2x earning rates, a $99 annual fee, and an unusual 15-month 0% balance
#   transfer intro offer. The 50,000-mile bonus is modest but the $2,000 spend
#   requirement is attainable, and no foreign transaction fees add practical
#   value.
#
# #10 southwest-rapid-rewards-premier-credit-card
#   Southwest Premier bridges the gap between the Plus and Priority tiers with
#   a slightly higher annual fee ($149) but more generous 3x earning on
#   Southwest purchases. The $1,500 spend requirement remains low, making it a
#   solid middle option for Southwest loyalists seeking better rewards without
#   the highest tier.
#
# #11 citi-aadvantage-globe
#   AAdvantage Globe is positioned for frequent AA travelers willing to pay
#   $350/year for strong earning: 6x points on AA hotel portal bookings is
#   valuable for travel-heavy users, and 3x on airline purchases supports
#   accelerated mile accumulation. The 60,000-mile bonus is solid given the
#   mid-tier fee.
#
# #12 united-quest
#   United Quest justifies its $350 annual fee through 5x earning on hotel
#   portal bookings (rivaling premium cards) and a $250 travel credit that
#   effectively offsets cost. The 80,000-mile bonus with generous earning
#   across multiple categories makes it strong for frequent United travelers
#   with diverse spending patterns.
#
# #13 southwest-rapid-rewards-priority-credit-card
#   Priority is Southwest's premium tier with strong perks (travel credit,
#   upgraded boardings, anniversary bonus) that offset the $229 fee for
#   dedicated Southwest flyers. The 4x earning on Southwest purchases is the
#   highest airline earning rate on the page, making it ideal for those
#   heavily concentrated on one carrier.
#
# #14 delta-skymiles-reserve-american-express-card (Best Premium)
#   The Reserve is the premium flagship for dedicated Delta flyers: the
#   125,000-mile bonus is the highest on the list, Sky Club access provides
#   consistent lounge value, and the companion certificate is a major perk.
#   The $650 fee is steep but justified for frequent Delta passengers who will
#   use lounge access and maximize the annual benefits.
#
# #15 citi-aadvantage-executive-world-elite-masterc
#   The Executive is positioned for premium American Airlines travelers:
#   Admirals Club membership and 10x portal earning are valuable perks for
#   frequent AA flyers, though the 70,000-mile bonus is lower than
#   similarly-priced competitors. The $595 fee is justified primarily by
#   lounge access and portal multipliers rather than the signup bonus alone.
#
# #16 united-club-infinite
#   Club Infinite is United's top-tier card with the highest annual fee ($695)
#   justified by United Club lounge access and 4x earning on United purchases.
#   The 90,000-mile bonus is solid with a fast 3-month spend window, but the
#   premium pricing makes it most valuable for elite United flyers who will
#   maximize lounge access.
#
# #17 delta-skymiles-blue-american-express-card
#   The Blue is the no-fee entry point into Delta's ecosystem with the lowest
#   bonus on the page (10,000 miles) but zero annual cost. It's best for
#   casual Delta flyers or those building credit who want to establish a
#   relationship with the program at no cost, though the weak bonus makes it
#   less competitive than paid alternatives.
#
# #18 american-airlines-aadvantage-mileu-mastercard
#   The MileU is a no-fee entry card for American Airlines with a modest
#   15,000-mile bonus and broad earning categories. It's suitable for new
#   AAdvantage members or casual AA flyers wanting to start earning without
#   commitment, though the limited bonus makes it less attractive than paid
#   options with stronger offers.
#
# #19 jetblue-card
#   The base JetBlue card offers 3x earning on JetBlue with no annual fee and
#   a 12-month balance transfer 0% APR window, making it practical for casual
#   JetBlue flyers. The 10,000-point bonus is minimal, positioning it as an
#   entry-level option best for those wanting to explore JetBlue rewards
#   without upfront cost.
#
# ============================================================

