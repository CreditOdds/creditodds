# ============================================================
# Best Airline Credit Cards — Ranking Reasoning (2026-06-01)
# ============================================================
#
# #1 united-gateway (Best No-Fee)
#   The United Gateway offers the best entry point for airline card holders
#   with zero annual fee, a clean $1,000 minimum spend, and solid 2x earning
#   on the primary category (airlines). It delivers immediate value without
#   requiring an investment, making it ideal for beginners and those wanting
#   airline benefits without commitment.
#
# #2 jetblue-plus-card (Best Overall Value)
#   The JetBlue Plus delivers the strongest earning rate on-airline (6x
#   points) combined with a generous 60,000-point bonus and low $1,000 spend
#   requirement. The $99 annual fee is offset by valuable perks (free checked
#   bag, inflight savings) and strong bonus category earning, making it the
#   best overall value for frequent JetBlue travelers.
#
# #3 jetblue-card (Best for Beginners)
#   The no-annual-fee JetBlue card is perfect for casual JetBlue travelers
#   seeking to test the loyalty program without ongoing costs. While the bonus
#   is smaller than the Plus, the 3x on-airline earning and zero fee make it a
#   low-risk entry point with solid ongoing rewards.
#
# #4 american-airlines-aadvantage-mileu-mastercard
#   This American Airlines card matches the United Gateway's low barrier to
#   entry with zero annual fee and $1,000 spend, though it offers fewer signup
#   miles (15,000 vs 30,000). It's a solid no-fee option for occasional
#   American Airlines flyers, but the lower bonus and matching earning rates
#   make it less competitive than cards ranked higher.
#
# #5 delta-skymiles-blue-american-express-card
#   The Delta Blue offers zero annual fee and 2x earning on Delta flights, but
#   the 6-month spend window and modest 10,000-mile bonus make it less
#   attractive than competing no-fee cards with 3-month timelines. It's best
#   for Delta loyalty program members who need an entry-level card without
#   annual commitment.
#
# #6 southwest-rapid-rewards-plus-credit-card
#   The Southwest Plus delivers a strong 80,000-point bonus with only a $1,000
#   spend requirement and $99 annual fee. The anniversary points benefit and
#   2x earning on multiple categories make it compelling for Southwest
#   loyalists, though 2x on-airline is lower than premium competitors like
#   JetBlue Plus at the same fee tier.
#
# #7 citi-aadvantage-platinum-select-world-elite-m
#   The Citi AAdvantage Platinum Select offers solid middle-ground value with
#   a 50,000-mile bonus, $99 annual fee, and travel perks. The $2,500 spend
#   requirement is higher than comparable cards, and the 2x on-airline earning
#   trails cards like JetBlue Plus, placing it below mid-tier options for most
#   travelers.
#
# #8 hawaiian-airlines-world-elite-mastercard
#   The Hawaiian Airlines card offers 3x on-airline earning and a solid
#   50,000-mile bonus, but the $2,000 spend requirement is higher than
#   competing $99 cards like Southwest Plus and JetBlue Plus. It's best for
#   Hawaiian Airlines frequent flyers seeking strong balance transfer terms
#   alongside airline rewards.
#
# #9 southwest-rapid-rewards-premier-credit-card
#   The Southwest Premier elevates the Plus with 3x on-airline earning and
#   annual upgraded boardings, justified by the higher 85,000-point bonus and
#   $149 fee. It's ideal for frequent Southwest travelers prioritizing higher
#   earning rates and boarding perks over the lower-cost Plus option.
#
# #10 united-explorer
#   The United Explorer matches premium competitors with 3x on-airline earning
#   and valuable Club pass benefits, but the 50,000-mile bonus is lower than
#   similarly-priced cards and the $3,000 spend requirement is high. The dual
#   Club passes add value for frequent United travelers, though the
#   bonus-to-fee ratio is less competitive.
#
# #11 british-airways-visa-signature-card
#   The British Airways card offers a strong 75,000-point bonus and $95 annual
#   fee for one-world alliance travelers, but the $5,000 spend requirement is
#   the highest among mid-tier cards. It's positioned for loyal British
#   Airways flyers willing to meet the higher spend threshold for premium
#   earning rates.
#
# #12 delta-skymiles-gold-american-express-card
#   The Delta Gold delivers an 80,000-mile bonus and checked bag benefits for
#   $150/year, but the 6-month spend timeline and 2x on-airline earning lag
#   behind competitors. The baggage benefit value proposition is modest
#   compared to premium cards offering greater overall perks.
#
# #13 southwest-rapid-rewards-priority-credit-card
#   The Southwest Priority tops the mid-tier cards with 4x on-airline earning
#   and the highest signup bonus (90,000 points), plus substantial credits and
#   perks offsetting the $229 annual fee. It's the best choice for elite
#   Southwest travelers seeking maximum points and boarding priority, though
#   the high fee requires significant flying activity to justify.
#
# #14 citi-aadvantage-globe
#   The Citi AAdvantage Globe targets premium American Airlines loyalty with
#   6x portal earning and a strong 90,000-mile bonus, but the $350 annual fee
#   and $5,000 spend requirement appeal only to high-volume business
#   travelers. The portal multiplier strategy differs from airline-focused
#   earning, positioning it for heavy travel planners via Citi channels.
#
# #15 united-quest
#   The United Quest justifies its $350 fee with 4x on-airline earning, up to
#   $250 in annual travel credits, and premium portal multipliers (5x hotels).
#   It's designed for high-spend United loyalists who book accommodations
#   through the portal and benefit from the travel credits, though the
#   60,000-mile bonus is modest for the fee tier.
#
# #16 delta-skymiles-platinum-american-express-card
#   The Delta Platinum adds a companion certificate to the mid-tier bonus
#   structure, making the $350 fee more appealing for frequent Delta flyers
#   with travel partners. The 3x on-airline earning and 6-month spend window
#   are acceptable for elite Delta members, though the fee-to-bonus ratio is
#   less aggressive than competing premium cards.
#
# #17 delta-skymiles-reserve-american-express-card (Best Premium)
#   The Delta Reserve is the flagship airline card with the highest signup
#   bonus (100,000 miles), companion certificate, and Sky Club lounge
#   membership justifying the $650 annual fee. It's purpose-built for elite
#   Delta flyers who spend significantly on the airline and leverage premium
#   lounge access and perks, making it the best premium choice despite the
#   high fee.
#
# #18 citi-aadvantage-executive-world-elite-masterc
#   The Citi AAdvantage Executive targets ultra-premium American Airlines
#   travelers with Admirals Club membership and 4x on-airline earning, but the
#   $595 fee and $7,000 spend requirement limit appeal to frequent heavy
#   spenders. The 10x portal multiplier and lounge access justify the fee for
#   business travelers maximizing both airline and hotel portal bookings.
#
# #19 united-club-infinite
#   The United Club Infinite is the highest-tier card with the strongest
#   on-airline earning (5x) and premium lounge access at $695/year. The
#   highest annual fee limits its audience to elite United frequent flyers who
#   value Club Infinite lounge access and maximize premium earning rates,
#   making it the best choice for the most committed airline loyalists.
#
# ============================================================

