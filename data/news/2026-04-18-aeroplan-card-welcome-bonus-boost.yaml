id: "aeroplan-card-welcome-bonus-boost"
date: "2026-04-18"
title: "Chase Aeroplan Card Welcome Offer Increased to 75,000 Points"
summary: "Starting April 16, 2026, the Chase Aeroplan Card is offering an elevated limited-time welcome bonus of 75,000 Aeroplan points for new cardholders. This represents a temporary increase from the standard offer."
tags:
  - "bonus-change"
  - "limited-time"
bank: "Chase"
card_name: "Aeroplan Credit Card"
source: "NerdWallet"
source_url: "https://www.nerdwallet.com/credit-cards/news/chase-aeroplan-card-boosts-bonus-limited-time-april-2026"
body: |
  Chase has temporarily increased the welcome bonus on its Aeroplan Card to **75,000 Aeroplan points**, effective **April 16, 2026**. The elevated offer represents a boost from the card's standard welcome bonus and is available for a limited time to new cardholders.
  
  The timing coincides with a broader surge in premium credit card sign-up bonuses across the industry, as issuers compete for new applicants during tax season when consumers are more likely to meet minimum spending requirements.
  
  Interested applicants should note that this is a limited-time promotion, meaning the offer could revert to standard levels once the promotional period ends. Those considering applying should review the card's full terms, benefits, and spending requirements to determine if it aligns with their travel and spending patterns.
