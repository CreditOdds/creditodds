title: "Amazon Launches Two New Small Business Credit Cards with U.S. Bank and Mastercard"
summary: "Amazon is ending its 8-year partnership with American Express and launching two new small business credit cards with U.S. Bank and Mastercard, launching spring 2026. This represents a significant shift in Amazon's credit card strategy and partnership direction."
