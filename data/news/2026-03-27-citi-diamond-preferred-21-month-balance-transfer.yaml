title: "Citi Diamond Preferred Offers 21-Month 0% Balance Transfer APR with 3% Intro Fee"
summary: "The Citi Diamond Preferred is featuring a limited-time 0% intro APR for 21 months on balance transfers with a reduced 3% intro balance transfer fee. This offer provides one of the longest balance transfer windows available, making it valuable for debt consolidation in 2026."
tags:
  - "limited-time"
  - "bonus-change"
bank: "Citi"
card_slug: "citi-diamond-preferred"
card_name: "Citi Diamond Preferred"
source: "The Motley Fool"
source_url: "https://www.fool.com/money/credit-cards/articles/0-intro-apr-for-21-months-this-balance-transfer-card-just-got-even-better"
body: |
  Citi has temporarily reduced the balance transfer fee on its Diamond Preferred card to **3%**, down from the card's standard rate, while maintaining a **21-month 0% introductory APR** on balance transfers.

  The limited-time offer makes the Citi Diamond Preferred one of the longest balance transfer windows currently available in the market. Cardholders who transfer a balance during the promotional period can avoid interest charges for nearly two years, providing a substantial advantage for debt consolidation strategies in 2026.

  The **3% introductory fee applies for the first four months** of the offer period. After that window closes, the standard balance transfer fee structure resumes.

  This promotion is time-limited, so interested applicants should act before the offer expires. The card carries no annual fee, making it an option for those focused on managing existing debt rather than earning rewards on new purchases.
