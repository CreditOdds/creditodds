title: "Marriott Bonvoy Brilliant Card Reaches Record 200,000-Point Welcome Bonus"
summary: "The Marriott Bonvoy Brilliant American Express Card's welcome offer has reached 200,000 bonus points in March 2026, matching the highest standalone point bonus in the card's recorded history dating back to 2020. The offer includes 200,000 Bonus Points plus a Free Night Reward after $3,000 spend in the first 6 months, with the offer expiring April 15, 2026."
