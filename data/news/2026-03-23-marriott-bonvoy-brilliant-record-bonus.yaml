body: |
  The Marriott Bonvoy Brilliant American Express Card is offering **200,000 bonus points** plus a Free Night Reward, marking the highest standalone welcome bonus in the card's history since its 2020 launch.
  
  To earn the full bonus, cardholders must spend **$3,000 within the first 6 months** of card membership. The offer is valid through **April 15, 2026**.
  
  This represents a significant increase from recent welcome offers on the card and ties the record for the largest point bonus American Express has offered on this product.
