title: "Capital One to Acquire Discover Financial Services"
summary: "Capital One announced plans to acquire Discover Financial Services to build a large U.S. payments player with its own card network. The deal would combine Capital One's credit card and banking operations with Discover's network. Potential long-term implications for cardholders of both issuers remain unclear pending regulatory approval."
