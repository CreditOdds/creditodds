title: "American Express Gold Card Adds Enhanced Benefits for 60th Anniversary, Maintains $325 Annual Fee"
summary: "American Express Gold Card adds new benefits including 5x points on Amex Travel hotels and complimentary Hertz elite status, celebrating its 60th anniversary. The card maintains its $325 annual fee with no increase. Benefits also include expanded dining partnerships and limited-time anniversary offers worth up to twice the annual fee."
