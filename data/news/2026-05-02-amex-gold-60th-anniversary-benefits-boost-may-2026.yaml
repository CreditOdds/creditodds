body: |
  American Express is enhancing its flagship Gold Card for its **60th anniversary** while keeping the **$325 annual fee unchanged**. The updated card adds several new benefits effective immediately.
  
  Cardholders will now earn **5x points on hotel bookings made through Amex Travel**, complementing the card's existing earning rates on dining and airfare purchases. The company is also providing **complimentary Hertz elite status** to cardholders, expanding travel perks beyond points multipliers.
  
  The Gold Card is introducing expanded partnerships with dining establishments, though specific details about these new relationships were not disclosed. To mark the milestone, American Express is offering limited-time anniversary promotions valued at **up to twice the annual fee**—potentially worth around $650 in total benefits during the promotional period.
  
  The decision to maintain the annual fee at **$325** stands out as the card market continues to see fee increases across premium offerings. Existing cardholders will automatically receive these new benefits, with no action required to access the enhanced rewards and complimentary services.
