body: |
  A federal judge has approved a **$425 million settlement** against Capital One to resolve a class action lawsuit alleging the company engaged in deceptive practices related to its 360 Savings credit card account.
  
  The settlement, approved in late April 2026, will distribute payouts to eligible cardholders who held qualifying 360 Savings accounts. Capital One customers believe they were misled about features or terms associated with the product, though specific details about the alleged deceptive practices remain limited in available reports.
  
  Eligible cardholders can submit claims to receive their portion of the settlement. Those who may qualify should watch for settlement notices containing information about which accounts are eligible, claim procedures, and submission deadlines. Customers are advised to monitor their mail and any official communications from Capital One or the settlement administrator for instructions on how to file a claim and the timeframe for doing so.
  
  This settlement represents one of several major enforcement actions against large financial institutions in recent years over consumer protection violations. Capital One customers who held the 360 Savings account during the relevant period should review settlement documentation carefully to determine their eligibility and ensure they meet any claim deadlines.
