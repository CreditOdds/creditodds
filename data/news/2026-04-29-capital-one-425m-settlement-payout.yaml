title: "Capital One Settles Lawsuit for $425M Over Deceptive 360 Savings Practices"
summary: "A federal judge approved a $425 million settlement against Capital One for allegedly using deceptive practices regarding its 360 Savings credit card account. Eligible cardholders can claim payouts; details on qualifying accounts and claim deadlines available through settlement notices."
