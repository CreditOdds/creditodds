title: "Chase Sapphire Preferred's 100K Bonus Is Back"
summary: "Chase has reintroduced a limited-time offer for the Sapphire Preferred card, featuring a welcome bonus of 100,000 points. This promotion, valued at around $2,050, is available to new applicants until a specified date, making it a compelling option for those seeking travel rewards."
