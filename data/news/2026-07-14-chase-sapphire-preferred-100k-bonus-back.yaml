body: |
  Chase has reintroduced its **Chase Sapphire Preferred card** with a limited-time welcome bonus of **100,000 points** for new applicants. This offer is valued at approximately **$2,050**, making it an attractive option for individuals looking to maximize their travel rewards. 
  
  New applicants can take advantage of this promotional offer until a **specified date** later this summer. The bonus is awarded after meeting a certain spending requirement within the initial months of account opening. This re-launch comes as part of Chase's broader strategy to enhance its credit card offerings amid the competitive financial landscape.
