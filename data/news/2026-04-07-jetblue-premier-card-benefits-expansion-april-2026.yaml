title: "JetBlue Premier Card Adds 4 Major Perks with No Annual Fee Increase"
summary: "JetBlue and Barclays announced April 6, 2026 that the JetBlue Premier World Elite Mastercard is gaining four new benefits while maintaining its $499 annual fee: 25 Tile bonus toward Mosaic elite status annually, new travel credits, expanded companion pass benefits, and enhanced TrueBlue Travel rewards flexibility."
