body: |
  JetBlue and Barclays announced **April 6, 2026** that the JetBlue Premier World Elite Mastercard is adding four new benefits while keeping the **$499 annual fee** unchanged.
  
  The card will now include an annual **25 Tile bonus** toward Mosaic elite status, which helps cardholders advance within JetBlue's frequent flyer program. The issuer is also introducing new travel credits, though specific details about the credit amounts and eligible purchases were not disclosed.
  
  Companion pass benefits have been expanded under the update, and the card will offer enhanced flexibility for TrueBlue Travel rewards redemptions. These changes are part of Barclays' broader strategy to boost value for premium travel cardholders without raising the cost of entry.
  
  The JetBlue Premier card competes in a crowded premium airline card segment where issuers have increasingly added perks—from travel credits to status bonuses—to justify elevated annual fees. By maintaining its current fee structure while enhancing benefits, Barclays aims to improve retention and appeal among existing and potential cardholders.
