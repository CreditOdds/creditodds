title: "Academy Sports Launches New Tiered myAcademy Rewards Mastercard with Up to 5% Cash Back"
summary: "Academy Sports + Outdoors launched the national rollout of the new myAcademy Rewards Mastercard in partnership with Bread Financial on March 20, 2026. The card features a tiered rewards structure offering up to 5% cash back on purchases at Academy Sports and enhanced rewards within the reimagined myAcademy Rewards loyalty program designed to help families save more."
tags:
  - "new-card"
source: "Morningstar/PR Newswire"
source_url: "https://www.morningstar.com/news/pr-newswire/20260320da15103/academy-sports-outdoors-launches-new-tiered-myacademy-rewards-credit-card-and-enhanced-loyalty-program-designed-to-help-families-save-more-and-have-more-fun"
body: |
  Academy Sports + Outdoors began the national rollout of its new myAcademy Rewards Mastercard on **March 20, 2026**, in partnership with Bread Financial.
  
  The card features a **tiered rewards structure offering up to 5% cash back** on purchases made at Academy Sports locations. The rewards program integrates with the reimagined myAcademy Rewards loyalty program, which the company designed to help families maximize savings across their purchases.
  
  The card is issued as a Mastercard, making it usable both at Academy Sports and other retailers that accept the payment network. While specific details about the tiered structure—such as exact cash back percentages at different spending levels or spending thresholds—were not disclosed, the program aims to reward customer loyalty through both the branded card and the broader loyalty initiative.
