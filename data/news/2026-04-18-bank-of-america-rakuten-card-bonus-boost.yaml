body: |
  Bank of America has significantly increased the welcome bonuses on its Rakuten rewards cards, effective **April 17, 2026**.
  
  The **Bank of America Rakuten Travel Rewards card** now offers a **$250 bonus or 25,000 points** upon meeting the minimum spend requirement, up from the previous **$150 or 15,000 points**. The **Bank of America Rakuten Customized Cash Rewards card** welcome offer increased to **$150 or 15,000 points**, compared to the earlier **$75 or 7,500 points**.
  
  These enhancements represent a **67% increase** for the Travel Rewards card and a **100% increase** for the Customized Cash Rewards card, making both cards more attractive to new applicants. The higher bonuses are available through the Rakuten portal.
