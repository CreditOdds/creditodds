title: "Bank of America Rakuten Cards Receive Significant Welcome Bonus Increases"
summary: "Bank of America Rakuten rewards cards are receiving increased welcome bonuses through Rakuten portal (effective April 17, 2026): Travel Rewards card bonus increased to $250/25K points (from $150/15K), and Customized Cash Rewards card increased to $150/15K points (from $75/7.5K). These represent substantial improvements for new applicants."
