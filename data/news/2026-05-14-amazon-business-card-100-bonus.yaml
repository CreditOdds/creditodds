title: "Amazon Business Card offers $100 statement credit with $3,000 spending requirement"
summary: "The Amazon Business Card provides a **$100 statement credit** sign-up bonus after **$3,000 in Net Purchases within the first 3 months** of account opening. The card is available through Amazon's business platform."
tags:
  - "general"
bank: "Amazon"
card_name: "Amazon Business Card"
source: "Amazon"
source_url: "https://www.amazon.com/dp/B0DVBL912R"
date: "2026-05-14"
body: |
  The **Amazon Business Card** carries a sign-up bonus of **$100 in statement credit**, awarded after applicants accumulate **$3,000 in Net Purchases during the first 3 months** following account opening.
  
  The card is positioned for business owners and procurement managers who use Amazon Business for their purchasing needs. The offer is presented as a standard public offer through Amazon's business card portal.
  
