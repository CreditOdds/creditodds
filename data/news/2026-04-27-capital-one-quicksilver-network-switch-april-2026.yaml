date: "2026-04-27"
title: "Select Capital One Quicksilver Cards Move from Mastercard to Discover, Add 3% Grocery and Gas Category"
summary: "Capital One is migrating select Quicksilver and QuicksilverOne cardholders from Mastercard to the Discover network, with new cards mailed in May 2026. Notified cardholders also gain a new 3% cash-back category on grocery stores and gas stations, on top of the existing 5% on hotels, rental cars, and vacation rentals booked through Capital One Travel and 1.5% on all other purchases. The change applies only to cardholders who received direct notification from Capital One; others remain on Mastercard with the standard earning structure."
