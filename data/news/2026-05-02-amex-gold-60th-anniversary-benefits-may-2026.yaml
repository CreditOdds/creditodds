body: |
  American Express is expanding benefits on its Gold Card to mark the company's **60th anniversary** while maintaining the card's **$325 annual fee** unchanged.
  
  The enhancements include **5x points on hotels booked through Amex Travel**, a new benefit that rewards cardholders for premium travel bookings. American Express also added **Hertz elite status** to the card's travel perks portfolio and expanded partnerships with dining establishments, further strengthening the card's focus on travel and dining rewards.
  
  The move reflects American Express's strategy to appeal to younger cardholders, particularly Gen Z and millennial consumers who prioritize travel and dining experiences. By adding substantive benefits without increasing the annual fee, Amex is positioning the Gold Card as a value proposition in the premium card segment—contrasting with industry trends where other major issuers have raised fees on comparable products.
  
  The **$325 annual fee** has remained constant, making this update a pure benefit expansion for existing and prospective cardholders. The specific effective date for these enhancements was **May 2, 2026**.
