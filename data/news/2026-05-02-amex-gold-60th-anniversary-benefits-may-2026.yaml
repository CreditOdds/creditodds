title: "American Express Gold Card Adds New Benefits for 60th Anniversary With No Fee Increase"
summary: "American Express enhanced the Gold Card with new benefits including 5x points on Amex Travel hotels, new Hertz elite status, and additional dining partners—all without raising the $325 annual fee. The enhancements reflect Amex's focus on travel and dining perks for Gen Z and millennial cardholders."
