title: "American Express Becomes NFL's Official Payments Partner, Replacing Visa"
summary: "American Express has been named the NFL's official payments partner starting with the 2026 season, replacing Visa which held the position since 1995. Amex cardholders will receive presale access to NFL events including the 2026 NFL Melbourne Game in September. This multi-year global partnership represents a significant shift in NFL corporate sponsorships."
tags:
  - "general"
bank: "American Express"
source: "Street Insider / Morningstar"
source_url: "https://www.streetinsider.com/Corporate+News/American+Express+becomes+NFLs+official+payments+partner+starting+2026/26240763.html"
body: |
  American Express has secured the **NFL's official payments partnership**, ending Visa's **31-year tenure** in the role that began in **1995**. The new multi-year global agreement takes effect with the **2026 season**.
  
  As part of the partnership, American Express cardholders will gain **presale access to NFL events**, including the **2026 NFL Melbourne Game in September**. The deal marks a significant shift in the league's major corporate sponsorships, with Amex replacing one of sports' most established payment partnerships.
