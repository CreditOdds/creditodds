title: "Hyatt Sign-Up Bonus Increased to 75K Points"
summary: "Chase has increased the sign-up bonus for the World of Hyatt Credit Card from 60,000 to 75,000 points for new applicants. This bonus is available for those who spend $3,000 in the first three months of account opening and includes various additional benefits, enhancing the card's value for travelers."
