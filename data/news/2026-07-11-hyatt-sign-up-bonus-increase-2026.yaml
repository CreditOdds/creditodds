body: |
  Chase has elevated the sign-up bonus for the **World of Hyatt Credit Card** from **60,000 to 75,000 points** for new applicants. To qualify for this bonus, cardholders must spend **$3,000** within the first three months of opening their account. 
  
  In addition to the increased bonus, the card offers various benefits designed to enhance its value for frequent travelers. This new offer is available now, providing an enticing opportunity for those looking to deepen their loyalty with Hyatt and maximize their travel rewards.
