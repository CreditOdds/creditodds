date: "2026-05-13"
body: |
  American Express has introduced a **$300 annual ChatGPT Business statement credit** for cardholders of its premium business cards, effective **May 12, 2026**.
  
  The benefit is available to **both new and existing cardholders** of the **Amex Business Gold Card** and **Amex Business Platinum Card**. The credit can be applied toward ChatGPT Business subscription costs and will be reflected as a statement credit.
  
  This addition enhances the value proposition of Amex's top-tier business cards, particularly for business owners and entrepreneurs who utilize AI tools in their operations. The **$300 annual benefit** represents a meaningful addition to existing card perks and rewards structures.
  
