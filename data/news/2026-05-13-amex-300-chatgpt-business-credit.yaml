id: "amex-300-chatgpt-business-credit"
title: "Amex Adds $300 Annual ChatGPT Business Credit to Business Gold and Platinum"
summary: "American Express has launched a **$300 annual ChatGPT Business statement credit** for all new and existing cardholders of the Amex Business Gold and Business Platinum cards, effective **May 12, 2026**. The credit applies to ChatGPT Business subscriptions."
