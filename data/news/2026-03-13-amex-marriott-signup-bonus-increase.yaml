body: |
  American Express has boosted the welcome offers on its Marriott Bonvoy co-branded credit card portfolio, increasing signup bonuses on both the **Marriott Bonvoy Brilliant** and **Marriott Bevy** cards, along with their business variants.
  
  The enhanced bonuses are now available to new applicants, providing greater value through the welcome offer stage. However, specific bonus amounts and spending requirements were not disclosed in the announcement.
  
  The timing of this increase comes as credit card issuers continue to compete aggressively on welcome incentives. Travel card signup bonuses have become significant enough in many cases to offset annual fees in the first year, making them a key factor for consumers evaluating card choices.
  
  Existing cardholders should note that signup bonus increases typically apply only to new applicants and do not retroactively benefit current account holders. Those interested in applying should review the full terms and conditions, including annual fees and ongoing benefits, to determine if the card aligns with their spending patterns and travel goals.
