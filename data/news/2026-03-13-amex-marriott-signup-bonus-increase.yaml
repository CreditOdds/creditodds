title: "American Express Increases Signup Bonuses on Marriott Brilliant and Bevy Cards"
summary: "American Express has increased the signup bonuses available on the Marriott Bonvoy Brilliant and Marriott Bevy co-branded credit cards, as well as their business variants. This enhancement provides new applicants with increased value on welcome offers across the Marriott card portfolio."
