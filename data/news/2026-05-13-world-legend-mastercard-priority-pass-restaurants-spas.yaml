title: "World Legend Mastercard Priority Pass Now Showing Restaurants and Spas"
summary: "Priority Pass is now displaying restaurants and spas as eligible venues for World Legend Mastercard holders, including Bilt Palladium and Citi Strata Elite cardholders. However, the benefit may not be showing for all users, and neither Bilt nor Citi have officially announced changes to the program."
