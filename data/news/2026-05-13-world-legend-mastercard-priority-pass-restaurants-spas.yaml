date: "2026-05-13"
body: |
  World Legend Mastercard holders are reporting that **Priority Pass is now showing restaurants and spas** as eligible venues on their accounts. This benefit is appearing for cardholders of the **Bilt Palladium** and **Citi Strata Elite**, which are co-branded versions of the World Legend Mastercard.
  
  According to reports, the restaurant and spa listings are appearing in some cardholders' Priority Pass accounts, suggesting the feature may be rolling out gradually. However, the availability appears inconsistent, with **not all cardholders seeing the benefit yet**.
  
  Notably, Bilt has stated that **nothing has officially changed** regarding the card's Priority Pass benefits, and neither Bilt nor Citi has made a public announcement about this update. This suggests the change may be a backend update or a phased rollout still in progress.
  
  Cardholders interested in verifying this benefit should check their Priority Pass account directly to see if restaurants and spas are now available in their region or card version.
  
