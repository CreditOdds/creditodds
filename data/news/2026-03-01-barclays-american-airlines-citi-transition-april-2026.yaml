title: "Barclays American Airlines Cards Converting to Citi on April 24, 2026"
summary: "All Barclays-issued American Airlines AAdvantage credit cards will automatically convert to Citi-issued cards on April 24, 2026. Citi becomes the exclusive issuer of American Airlines cobranded cards. Cardholders should expect account transitions and may see benefit changes."
tags:
