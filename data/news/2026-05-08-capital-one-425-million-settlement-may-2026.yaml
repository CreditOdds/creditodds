title: "Capital One Cardholders to Receive $425 Million Class Action Settlement"
summary: "Capital One account holders are eligible to receive payments from a $425 million class action settlement, with payments expected to be distributed starting summer 2026. Settlement qualifications and payment amounts vary by individual account history."
tags:
  - "general"
bank: "Capital One"
source: "USA Today"
source_url: "https://www.usatoday.com/story/money/2026/05/03/capital-one-settlement-who-qualifies-when-payments-come/89920197007/"
body: |
  Capital One account holders are eligible to receive payments from a **$425 million class action settlement**, with distributions expected to begin in **summer 2026**.
  
  The settlement applies to Capital One cardholders, though eligibility and payment amounts vary depending on individual account history. Affected cardholders do not need to take action to receive their portion—payments will be distributed directly to qualified accounts.
  
  According to settlement details, payments are scheduled to arrive later this summer, though the exact timing may vary by account. Individuals uncertain about their eligibility should review the settlement documentation or contact Capital One directly for account-specific information.
