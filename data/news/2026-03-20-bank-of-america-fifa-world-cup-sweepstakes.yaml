date: "2026-03-20"
title: "Bank of America Visa Cardholders Can Win VIP FIFA World Cup 2026 Packages"
summary: "Bank of America and Visa launched a promotional sweepstakes running March 20 through April 20, 2026, where every qualifying purchase made with an eligible Bank of America Visa credit card automatically enters cardholders for a chance to win one of three FIFA World Cup 2026 Hospitality Packages, including VIP tickets to matches and the final."
tags:
  - "limited-time"
bank: "Bank of America"
source: "PR Newswire"
source_url: "https://www.prnewswire.com/news-releases/bofa-teams-with-visa-to-offer-cardholders-a-chance-to-win-a-trip-to-the-fifa-world-cup-2026-302718715.html"
body: |
  Bank of America and Visa are offering eligible cardholders a chance to win premium FIFA World Cup 2026 experiences through a limited-time sweepstakes. The promotion runs from **March 20 through April 20, 2026**.
  
  Every qualifying purchase made with an eligible Bank of America Visa credit card automatically enters the cardholder into the drawing. The grand prizes include **three FIFA World Cup 2026 Hospitality Packages**, which feature VIP tickets to matches and access to the tournament final.
  
  Bank of America has not publicly specified which of its Visa cards qualify for the promotion or detailed the minimum purchase requirements to trigger an entry. Cardholders interested in participating should verify their card's eligibility through Bank of America's official channels or promotional materials.
