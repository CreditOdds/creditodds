body: |
  American Express has increased the signup bonuses available on its Marriott Bonvoy credit card portfolio, enhancing the value proposition for new cardholders across multiple product tiers.
  
  The elevated bonuses now apply to the **Marriott Bonvoy Brilliant**, **Marriott Bonvoy Bevy**, and **Marriott Bonvoy Business** card variants. The updated offers reward new cardholders who meet specified spending requirements, though the exact bonus amounts and spending thresholds were not detailed in available sources.
  
  The timing of this bonus increase aligns with a broader wave of competitive credit card offers throughout March 2026, as issuers refresh their promotional calendars. American Express's move reflects ongoing efforts to attract new customers in the premium travel rewards segment, where Marriott Bonvoy loyalty program integration remains a key differentiator.
  
  Existing cardholders should note that signup bonus increases typically apply only to new applicants and do not retroactively benefit current account holders. Those interested in capitalizing on the enhanced offers should review the specific bonus structures and spending requirements for each card variant, as these details vary by product.
