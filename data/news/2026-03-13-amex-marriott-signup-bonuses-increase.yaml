title: "American Express Increases Signup Bonuses on Marriott Bonvoy Credit Cards"
summary: "American Express has elevated signup bonuses on multiple Marriott Bonvoy credit cards, including the Marriott Bonvoy Brilliant, Bevy, and Business card variants. The increased bonuses provide additional value for new cardholders meeting the spending requirements."
tags:
  - "bonus-change"
bank: "American Express"
source: "Doctor of Credit"
