date: "2026-05-14"
title: "Amex, Chase, Capital One Build Private Spending Ecosystems"
summary: "Major credit card issuers are consolidating restaurant and hospitality platforms—Amex acquired Resy, Chase acquired The Infatuation, and Capital One sponsors major food festivals—signaling a shift toward proprietary loyalty ecosystems that give cardholders exclusive early access to events and dining experiences, moving beyond traditional rewards programs."
tags:
  - "general"
  - "benefit-change"
source: "Fortune"
source_url: "https://fortune.com/2026/05/11/american-express-amex-chase-sapphire-credit-card-ecosystem-resy-infatuation/"
body: |
  Major credit card issuers are building proprietary dining and entertainment platforms, consolidating control over premium experiences for their cardholders.
  
  **American Express acquired Resy**, the popular restaurant reservation platform, while **Chase purchased The Infatuation**, a well-known food media and discovery brand. **Capital One** has taken a different approach, securing sponsorships of major food festivals including the **New York City Wine & Food Festival** and the **South Beach Wine & Food Festival**, granting cardholders early access to these events.
  
  These moves signal a fundamental shift away from traditional point-based rewards programs. Rather than offering generic cash back or travel miles, issuers are now creating exclusive ecosystems where cardholders gain priority access to dining reservations, culinary events, and hospitality experiences that competitors cannot replicate.
  
  The strategy allows these companies to deepen cardholder engagement by providing experiences that feel more premium and personalized than standard rewards. By owning or controlling platforms where spending naturally occurs—restaurants, events, and entertainment venues—issuers can track customer preferences and create more targeted loyalty incentives.
  
  This consolidation also gives cardholders potential advantages: American Express and Chase cardholders may receive priority booking windows or special pricing on Resy and Infatuation platforms respectively, while Capital One cardholders can access festival experiences before the general public.
