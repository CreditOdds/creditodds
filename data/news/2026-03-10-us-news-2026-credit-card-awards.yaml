body: |
  U.S. News & World Report announced its **2026 Credit Card Awards** on **March 10, 2026**, recognizing top-performing credit cards across **10 categories**.
  
  The awards honored cards from major issuers including **Bank of America, Discover, American Express, and Chase**. The Bank of America Customized Cash Rewards card received recognition for its distinguishing feature that allows cardholders to select their own cash back categories. According to the awards materials, this flexibility enables users to customize rewards based on their spending priorities—whether groceries, gas, dining, pharmacy purchases, or other categories that fit their individual needs.
  
  The rankings were compiled by U.S. News & World Report, which positions itself as a global authority on consumer rankings and advice. The full list of award winners spans multiple card categories, though specific details about the other category winners were not disclosed in the announcement.
