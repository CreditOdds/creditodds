body: |
  U.S. News & World Report announced its **2026 Credit Card Awards** on **March 10, 2026**, recognizing top-performing credit cards across **10 categories**. The awards recognize offerings from major issuers including Bank of America, Discover, American Express, and Chase.
  
  Among the recognized cards, the **Bank of America® Customized Cash Rewards card** earned recognition for its distinctive feature allowing cardholders to select their own cash back categories. Cardholders can choose categories that align with their spending habits, such as groceries, gas, dining, pharmacy purchases, or other options.
  
  The awards represent U.S. News & World Report's evaluation of credit card products based on their features, benefits, and value to consumers across multiple categories.
