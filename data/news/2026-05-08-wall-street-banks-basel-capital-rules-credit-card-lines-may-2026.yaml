title: "JPMorgan and Wall Street Banks Push for Relief on Basel Credit Card Capital Rules"
summary: "Major U.S. banks including JPMorgan Chase, Wells Fargo, Citigroup, and Bank of America are lobbying for changes to proposed Basel capital rules that would require banks to hold capital against 10% of unused credit card lines. The banks argue the requirement could increase capital needs and potentially affect credit availability for consumers."
tags:
  - "policy-change"
source: "Finance Commerce"
source_url: "https://finance-commerce.com/2026/05/wall-street-banks-capital-rule-relief/"
body: |
  Major U.S. banks are mounting a coordinated lobbying effort to challenge proposed Basel capital rules that would significantly impact their credit card operations.
  
  **JPMorgan Chase, Wells Fargo, Citigroup, and Bank of America** have joined together to push back against regulations that would require banks to hold capital reserves against **10% of unused credit card lines**. The proposed Basel rules would effectively treat dormant credit capacity as a financial liability, forcing institutions to set aside additional capital to cover potential future usage.
  
  The banks argue that the requirement presents two primary concerns. First, it would substantially increase their overall capital needs—a significant burden for institutions already subject to rigorous post-2008 financial crisis regulations. Second, and more consumer-facing, the banks contend the rule could constrain their ability to offer generous credit limits and maintain credit availability for consumers.
  
  The timing of this push comes as credit card debt continues climbing nationally, with experts increasingly warning consumers about overextended borrowing. However, the banks' position is that tighter capital requirements could force them to reverse course and reduce the credit lines available to cardholders.
  
  The Basel framework, which sets international banking standards, periodically undergoes revision. These proposed changes represent an effort to strengthen bank balance sheets by accounting for contingent liabilities like unused credit commitments. The banking industry's collective response suggests the capital impact would be substantial enough to warrant unified opposition.
  
  The outcome remains uncertain, as regulators typically weigh industry concerns against financial stability objectives. The U.S. banking agencies overseeing Basel implementation will ultimately determine whether to adopt, modify, or reject the proposed rule.
