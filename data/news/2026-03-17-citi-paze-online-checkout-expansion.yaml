title: "Citi Expands Paze Online Checkout Service Across Customer Base"
summary: "Early Warning Services announced that Citi will now offer Paze, the bank-offered online checkout solution, expanding access to millions of customers. This integration allows Citi cardholders to use Paze for faster, more secure online payments at checkout."
tags:
  - "benefit-change"
  - "policy-change"
bank: "Citi"
source: "PR Newswire"
source_url: "https://www.prnewswire.com/news-releases/early-warning-services-expands-paze-online-checkout-to-citi-302715396.html"
body: |
  Early Warning Services announced on **March 17, 2026**, that Citibank will now offer Paze, its bank-offered online checkout solution, to its customer base. The expansion grants millions of Citi cardholders access to the digital payment service at checkout.
  
  Paze enables faster and more secure online payments, allowing customers to complete transactions without repeatedly entering payment card information across different retailers. By integrating Paze into its offerings, Citi joins the growing roster of financial institutions making the checkout solution available to their customers.
  
  Early Warning Services, the company behind the popular peer-to-peer payment platform Zelle, developed Paze as part of its broader suite of payment solutions. The service is designed to streamline the online shopping experience while enhancing security protections during transactions.
