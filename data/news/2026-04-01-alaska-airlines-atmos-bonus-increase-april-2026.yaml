title: "Alaska Airlines Atmos Credit Cards Boost Welcome Bonuses to 100K Points"
summary: "Beginning April 1, 2026, the Alaska Airlines Atmos credit cards issued by Bank of America are offering higher limited-time welcome bonuses, with the Atmos Summit card reaching up to 100K points. This represents a temporary increase from standard offers and applies to targeted applicants."
