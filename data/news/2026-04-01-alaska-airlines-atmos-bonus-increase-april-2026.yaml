body: |
  Bank of America is increasing welcome bonuses on its Alaska Airlines Atmos credit card lineup effective **April 1, 2026**. The **Atmos Summit card** now offers up to **100,000 points** as a limited-time welcome bonus, representing a temporary boost from the card's standard offer.
  
  The enhanced bonus applies to targeted applicants and is available for a limited time only. Bank of America has not disclosed specific spending requirements or other terms associated with the elevated offer.
  
  This marks a shift in Alaska Airlines credit card promotions as the airline and issuer look to attract new cardholders during the promotional period.
