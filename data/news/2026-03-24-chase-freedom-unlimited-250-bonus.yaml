date: "2026-03-24"
title: "Chase Freedom Unlimited Raises Welcome Bonus to $250 (Limited Time)"
summary: "Chase Freedom Unlimited is offering a limited-time $250 sign-up bonus after $500 spend in the first 3 months, up from the card's standard $200 bonus. This $50 increase provides enhanced value for new applicants but is time-limited."
tags:
