  - "bonus-change"
bank: "Chase"
card_slug: "chase-freedom-unlimited"
card_name: "Chase Freedom Unlimited Card"
source: "U.S. News & World Report"
source_url: "https://money.usnews.com/credit-cards/articles/limited-time-250-bonus-for-chase-freedom-unlimited"
body: |
  Chase has increased the welcome bonus on its Chase Freedom Unlimited Card to **$250** for a limited time, up from the card's standard **$200** bonus.
  
  New cardholders can earn the **$250** bonus after spending **$500** in the first **3 months** from account opening. The increased offer provides an extra **$50** in value compared to the card's regular welcome bonus.
  
  This is a time-limited promotion, so interested applicants should review Chase's official terms for the specific end date of the offer.
