title: "Capital One to Emirates Transfer Rate Cut to 1:0.75 Effective January 13"
summary: "Capital One Venture X cardholders will see their Emirates transfer rate reduced from 1:1 to 0.75:1, effective January 13, 2026. This devalues premium airline redemptions for cardholders relying on Emirates transfers."
