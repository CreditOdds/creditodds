date: "2026-05-08"
title: "Trump Official Highlights Americans' Soaring Credit Card Spending Amid Cost-of-Living Concerns"
summary: "Kevin Hassett, National Economic Council Director, touted record credit card spending as positive economic news, but the statement drew criticism as millions struggle with inflation, high gas prices, slow job market, and rising costs of living. The comment highlights the disconnect between official economic narratives and consumer financial stress."
tags:
  - "general"
source: "Yahoo Finance"
source_url: "https://finance.yahoo.com/economy/articles/trump-official-boasts-that-americans-credit-card-spending-is-through-the-roof-201026439.html"
body: |
  Kevin Hassett, Director of the National Economic Council, pointed to **record credit card spending** as a positive economic indicator, but the statement has drawn sharp pushback from critics who argue it obscures the financial strain facing millions of Americans.
  
  The comment comes as consumers grapple with persistent inflation, elevated gas prices, a sluggish job market, and rising costs across essential categories. Credit card debt has been climbing nationwide, becoming what financial experts describe as "a real issue among borrowers," according to reporting from May 2026.
  
  The disconnect between Hassett's optimistic framing and consumer financial stress highlights a broader tension in how economic data is interpreted. While increased spending can signal consumer confidence in traditional economic metrics, critics argue that much of the recent credit card usage reflects necessity rather than discretionary purchasing power—consumers relying on borrowed money to cover basic expenses as wages lag behind inflation.
  
  The observation also comes as consumers increasingly turn to credit cards with extended 0% introductory APR periods, such as those offering interest-free terms for up to 24 months on purchases and balance transfers. The prevalence of these promotional offers suggests demand from consumers seeking breathing room to manage existing debt loads.
