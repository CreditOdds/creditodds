title: "Discover Discontinuing Connected Account and Pay with Rewards Apple Pay Features (June 4)"
summary: "Discover will discontinue its integration with Connected Account and Pay with Rewards features on Apple Pay effective June 4, 2026. Cardholders relying on these features for account management or rewards redemption will need to transition to alternative methods before the discontinuation date."
