bank: "Bank of America"
source: "Royal Caribbean Blog"
source_url: "https://news.royalcaribbean.com"
body: |
  Royal Caribbean Group and Bank of America have unveiled **Royal ONE and Royal ONE Plus**, marking the cruise industry's first tri-branded credit cards that consolidate rewards across three distinct cruise lines.
  
  The cards earn points across **Royal Caribbean, Celebrity Cruises, and Azamara**, unifying the rewards program for guests who travel with multiple brands under the Royal Caribbean umbrella. Previously, each cruise line maintained separate card offerings.
  
  The **Royal ONE Plus card** carries a **$99 annual fee** and includes cardholder perks such as priority boarding and anniversary spend rewards. Both cards feature unified earning across all three cruise lines, streamlining the rewards experience compared to managing separate branded cards.
  
  The launch follows Royal Caribbean's broader strategy of integrating its portfolio of cruise brands, which includes the mainstream Royal Caribbean International, premium Celebrity Cruises, and luxury-focused Azamara. The tri-branded structure allows cardholders to accumulate rewards regardless of which brand they book, addressing a gap for guests loyal to multiple properties within the group.
  
  Specific welcome bonus details, earning rates, and additional benefits for the standard Royal ONE card were not disclosed at launch on **April 3, 2026**.
