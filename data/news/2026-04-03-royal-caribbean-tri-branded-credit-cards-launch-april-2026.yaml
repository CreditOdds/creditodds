title: "Royal Caribbean Launches Industry's First Tri-Branded Credit Cards with Bank of America"
summary: "Royal Caribbean Group partnered with Bank of America to launch Royal ONE and Royal ONE Plus credit cards, the industry's first tri-branded cards earning rewards across Royal Caribbean, Celebrity Cruises, and Azamara. The Royal ONE Plus card carries a $99 annual fee and offers priority boarding, anniversary spend rewards, and unified earning across all three cruise lines for the first time."
tags:
