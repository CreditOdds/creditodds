title: "American Express Adds $300 ChatGPT Credits to Business Platinum and Business Gold Cards"
summary: "American Express announced that cardholders of The Business Platinum Card and American Express Business Gold Card will receive $300 in annual ChatGPT credits as a new benefit, effective 2026. This addition supports business owners with AI-powered productivity tools and represents Amex's expansion of digital benefits for commercial cardholders."
