intro: |
  Westgate Resorts is a privately held hospitality company that operates timeshare and
  vacation-ownership resorts across popular U.S. destinations like Orlando, Las Vegas, and
  Gatlinburg, and also rents units nightly to non-owners much like a traditional resort
  chain. It is not affiliated with the major hotel loyalty programs. There's no Westgate
  Resorts co-brand credit card, so a general hotel or travel category card, or a flat-rate
  cashback card, is the better way to pay for stays and maintenance-fee charges.
