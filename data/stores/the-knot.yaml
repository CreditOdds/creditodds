intro: |
  The Knot is a wedding planning platform offering vendor directories, registries, website
  builders, and invitation design, operated by The Knot Worldwide alongside sister brands
  like WeddingWire. Purchases through the site typically flow through The Knot's gift and
  registry shop or its invitation and stationery store rather than a single storefront. The
  Knot has no co-brand credit card, so a card with a strong online shopping bonus category,
  or a flat-rate cashback card, is the most reliable way to earn rewards on registry or
  stationery purchases.
