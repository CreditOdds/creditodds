intro: |
  True Religion is a premium denim brand founded in Los Angeles in 2002, known for its
  signature horseshoe stitching on back pockets, with a catalog that has since expanded into
  broader apparel and accessories sold through its own stores and website. It has no
  co-brand credit card. Shoppers buying directly through truereligion.com will get the most
  value from a card with a strong online shopping or select-clothing bonus category, and a
  flat-rate cashback card is a solid fallback for purchases at a physical store.
