intro: |
  Virgin Experience Gifts is an online marketplace, operating under license from the Virgin
  Group brand, that sells gift experiences such as spa days, hot air balloon rides, driving
  experiences, and adventure outings that recipients redeem with local partner vendors. It
  functions more like a curated gift-card platform than a direct service provider. There's
  no Virgin Experience Gifts co-brand credit card, so a general online shopping rewards
  card, or an entertainment category card where one applies, is the better way to pay than
  expecting a dedicated bonus.
