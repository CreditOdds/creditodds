intro: |
  TransUnion is one of the three major U.S. credit bureaus, and its consumer-facing
  subscription products offer credit monitoring, credit score tracking, and identity theft
  protection billed on a recurring monthly basis. It has no co-brand credit card, and using
  it does not affect your credit score or the odds of approval for any specific card. Since
  the charge is a recurring subscription rather than a retail purchase, a flat-rate cashback
  card or a card with a broad online shopping bonus is the most reliable way to earn rewards
  on the monthly fee.
