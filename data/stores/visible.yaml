intro: |
  Visible is a Verizon-owned prepaid wireless carrier that sells phone plans exclusively
  online, running on Verizon's network but without the retail stores, contracts, or bundled
  device financing of the parent brand. Plans are flat monthly rates with no separate taxes
  or fees added at checkout. There's no Visible co-brand credit card, so recurring bills are
  best paid with a card that earns bonus rewards on cell phone or phone bill purchases, or a
  flat-rate cashback card if no phone category applies.
