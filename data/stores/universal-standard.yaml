intro: |
  Universal Standard is a direct-to-consumer apparel brand built around extended sizing,
  typically running from size 00 up through 40, with core pieces designed to be reordered
  in a consistent fit across seasons. The label sells primarily through its own site and app
  rather than leaning on wholesale department-store distribution. There's no Universal
  Standard co-brand credit card, so shoppers are better served pairing purchases with a
  general online shopping rewards card or a flat-rate cashback card rather than expecting a
  department-store bonus category to apply.
