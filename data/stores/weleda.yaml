intro: |
  Weleda is a Swiss company that has made natural and certified-organic skincare, body care,
  and homeopathic remedies since the 1920s, built around botanical ingredients and
  biodynamic farming practices. Its skin food and calendula lines are the brand's best-known
  U.S. products, sold direct online and through natural-grocery and pharmacy retailers.
  There's no Weleda co-brand credit card, so a general online shopping rewards card or a
  flat-rate cashback card is the practical choice for purchases made directly through the
  brand's site.
