intro: |
  Wacoal is a Japanese intimate apparel company whose American division sells bras,
  shapewear, and lingerie known for fit engineering and sizing that extends well beyond
  standard ranges. Products are sold direct online as well as through department stores and
  specialty lingerie retailers. There's no Wacoal co-brand credit card, so purchases are best
  matched to a department-store rewards card when buying through a wholesale partner, or a
  general online shopping or flat-rate cashback card for direct orders.
