intro: |
  TRX Training is the maker of the TRX Suspension Trainer, a strap-based bodyweight
  resistance system originally developed by a former Navy SEAL and now used in gyms, homes,
  and military training programs, alongside a library of workout programming sold through
  its own site. TRX has no co-brand credit card. Since these are equipment purchases rather
  than a membership, a flat-rate cashback card or a card that boosts online shopping
  purchases is the most reliable way to earn rewards on an order.
