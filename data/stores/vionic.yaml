intro: |
  Vionic is a footwear brand built around built-in orthotic arch support, positioning its
  sandals, sneakers, and boots as comfort-first alternatives to standard fashion shoes. The
  line is developed with input from podiatrists and sold through its own site as well as
  shoe and department stores. There's no Vionic co-brand credit card, so a general online
  shopping rewards card or a flat-rate cashback card is the practical choice for purchases
  made directly through vionicshoes.com.
