intro: |
  Vince Camuto is a contemporary footwear and accessories label, founded by the designer of
  the same name, known for women's heels, boots, and handbags sold through its own stores
  and site as well as department stores and shoe retailers. The brand also licenses apparel
  and eyewear lines. There is no Vince Camuto co-brand credit card, so shoppers should lean
  on a department-store rewards card when buying through a wholesale partner, or a general
  online shopping or flat-rate cashback card for direct purchases.
