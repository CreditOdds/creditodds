intro: |
  Weber is the maker of the iconic kettle charcoal grill, a design that dates back to the
  1950s, and has since grown into a full lineup of gas, charcoal, pellet, and electric
  grills along with smokers, accessories, and a connected app for monitoring cooks. Products
  are sold direct online, through Weber-branded retail, and through home and hardware
  stores. There's no Weber co-brand credit card, so a home improvement category card or a
  general online shopping rewards card is the better fit for grill and accessory purchases.
