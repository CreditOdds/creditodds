intro: |
  Vera Bradley is an Indiana-founded lifestyle brand known for quilted cotton handbags,
  totes, and travel accessories in signature bold prints, sold through its own stores and
  site as well as through department stores and specialty retailers. The company has since
  expanded into luggage, home goods, and licensed apparel lines. There is no Vera Bradley
  co-brand credit card, so purchases are best matched to a department-store rewards card
  when buying through a wholesale partner, or a general online shopping or flat-rate
  cashback card when ordering directly from verabradley.com.
