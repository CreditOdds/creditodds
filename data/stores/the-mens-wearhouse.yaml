intro: |
  The Men's Wearhouse is a men's formalwear and business-apparel retailer known for suit
  sales and tuxedo rentals, operating hundreds of stores nationwide alongside its online
  shop, and owned by Tailored Brands, which also owns Jos. A. Bank. There is no Men's
  Wearhouse co-brand credit card, though the retailer does offer its own Perfect Fit loyalty
  program. For everyday credit card rewards, shoppers should reach for a card with a strong
  online shopping or select-clothing bonus category when buying online, or a flat-rate
  cashback card in store.
