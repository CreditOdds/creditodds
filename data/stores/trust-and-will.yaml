intro: |
  Trust & Will is an online estate planning service that lets people build wills, trusts, and
  guardian designations through a guided digital questionnaire instead of hiring a traditional
  estate attorney. Plans are priced as flat one-time or subscription fees rather than by the
  hour, which makes the total cost predictable up front. There's no Trust & Will co-brand
  credit card, so the smartest way to pay is a flat-rate cashback card or a card that earns
  bonus rewards on general online purchases, since estate planning fees usually fall outside
  any dedicated bonus category.
