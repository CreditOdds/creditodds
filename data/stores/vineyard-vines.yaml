intro: |
  vineyard vines is a preppy American apparel brand recognized by its embroidered whale
  logo, built around Nantucket-inspired menswear, womenswear, and kids' clothing like
  performance polos, shorts, and dresses. The brand sells through its own stores and site as
  well as select department and specialty stores. There's no vineyard vines co-brand credit
  card, so a department-store rewards card fits purchases made through a wholesale partner,
  while a general online shopping or flat-rate cashback card works best for direct orders.
