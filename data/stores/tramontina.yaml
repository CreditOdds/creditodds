intro: |
  Tramontina is a Brazilian manufacturer of cookware, cutlery, and kitchen tools, with a
  U.S.-facing catalog of stainless steel and nonstick cookware, knives, and outdoor cooking
  gear sold direct online as well as through retailers like Amazon and Walmart. It has no
  co-brand credit card. Shoppers buying directly from tramontinausa.com are best served by a
  card with a strong home improvement or online shopping bonus category, while purchases made
  through a third-party retailer may earn under that store's own bonus category instead.
