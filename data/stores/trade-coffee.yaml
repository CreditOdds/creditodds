intro: |
  Trade Coffee is a subscription service that matches subscribers with beans from a network
  of independent roasters across the United States based on taste preferences, shipping
  freshly roasted coffee on a recurring schedule rather than selling a single house blend.
  It has no co-brand credit card. Because it functions like a recurring food and beverage
  purchase, a card with a strong dining or online shopping bonus category will typically earn
  the most on a subscription charge.
