intro: |
  Wrangler is a denim and western-wear brand dating back to the 1940s, known for jeans built
  for riding and rodeo work as well as broader casualwear, and now owned by Kontoor Brands
  alongside Lee. Products are sold direct online and through mass-market, department, and
  farm-and-ranch retailers. There's no Wrangler co-brand credit card, so a department-store
  rewards card fits purchases made through a wholesale partner, while a general online
  shopping or flat-rate cashback card works best for direct orders.
