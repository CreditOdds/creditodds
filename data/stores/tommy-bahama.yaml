intro: |
  Tommy Bahama is an island-lifestyle apparel brand known for its silk camp shirts and resort
  wear, also operating a chain of restaurant-and-retail locations, and owned by Oxford
  Industries. It has no co-brand credit card. Purchases made directly through
  tommybahama.com are best matched to a card with a strong online shopping or
  select-clothing bonus category, while dining at one of its restaurant locations would
  instead earn under a card's dining category.
