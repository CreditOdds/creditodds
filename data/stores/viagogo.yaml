intro: |
  Viagogo is an online ticket resale marketplace where fans buy and sell tickets to concerts,
  sports, and theater events, primarily serving customers outside the United States as the
  international counterpart to its sister platform StubHub. Prices are set by individual
  sellers and can run above or below face value depending on demand. There's no Viagogo
  co-brand credit card, so the better play is a card that earns bonus rewards on
  entertainment or ticketing purchases, or a flat-rate cashback card if no entertainment
  category applies.
