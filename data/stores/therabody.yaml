intro: |
  Therabody is a wellness technology company best known for its Theragun percussive massage
  devices, later expanding into recovery products like the RecoveryAir compression system
  and Bioboost wearables, sold through its own site as well as retailers such as Best Buy and
  Dick's Sporting Goods. Therabody has no co-brand credit card. Ordering directly from
  therabody.com is best matched to a card with a strong online shopping bonus category, while
  a flat-rate cashback card is a reliable fallback for in-store retailer purchases.
