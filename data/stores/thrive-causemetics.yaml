intro: |
  Thrive Causemetics is a cruelty-free cosmetics brand built around a buy-one-give-one model
  that donates products and funds to causes supporting women, sold primarily direct-to-
  consumer online as well as through Ulta Beauty. It has no co-brand credit card. Orders
  placed directly on thrivecausemetics.com are best matched to a card with a strong online
  shopping bonus category, while purchases made through Ulta would instead earn under that
  retailer's own department-store or beauty category.
