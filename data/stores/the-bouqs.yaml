intro: |
  The Bouqs Company is an online flower delivery service that ships farm-direct bouquets cut
  to order rather than sourcing from a traditional florist warehouse, along with plants and
  gift add-ons, sold through its own website and app on a one-time or subscription basis.
  It has no co-brand credit card. Because it operates purely as an online retailer, a card
  with a strong online shopping bonus category, or a flat-rate cashback card, will earn the
  most on an order.
