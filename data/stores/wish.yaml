intro: |
  Wish is an online marketplace best known for low-priced goods, from apparel and gadgets to
  home items, shipped largely from third-party sellers and manufacturers overseas. The
  platform emphasizes deep discounts over brand-name selection, with delivery times that can
  run longer than typical U.S. retailers. There's no Wish co-brand credit card, so a general
  online shopping rewards card or a flat-rate cashback card is the practical way to earn
  rewards on purchases.
