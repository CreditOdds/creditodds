name: Build and Deploy Cards

on:
  push:
    branches:
      - main
    paths:
      - 'data/cards/**'
  workflow_dispatch:
    inputs:
      test_post_file:
        description: 'Test new-card social posting with a specific card YAML (e.g. data/cards/aaa-daily-advantage-visa-signature.yaml)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Need previous commit to detect new files

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build cards.json
        run: npm run build:cards

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::953352003729:role/GitHubActions-CreditOdds
          aws-region: us-east-2

      - name: Upload cards.json to S3
        run: aws s3 cp data/cards.json s3://${{ secrets.S3_BUCKET_NAME }}/cards.json --content-type application/json --cache-control "max-age=300"

      - name: Upload card images to S3
        run: |
          if find data/cards/images -type f ! -name '.gitkeep' | grep -q .; then
            echo "Uploading card images to S3..."
            aws s3 sync data/cards/images/ s3://${{ secrets.S3_IMAGES_BUCKET_NAME }}/card_images/ --exclude ".gitkeep" --cache-control "max-age=86400"
            echo "Images uploaded successfully"
          else
            echo "No images to upload"
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/cards.json"
          if find data/cards/images -type f ! -name '.gitkeep' | grep -q .; then
            aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_IMAGES_DISTRIBUTION_ID }} --paths "/card_images/*"
          fi

      - name: Wait for CloudFront invalidation
        run: |
          echo "Waiting 60 seconds for CloudFront cache invalidation to propagate..."
          sleep 60

      - name: Sync cards to database
        id: sync
        run: |
          echo "Invoking sync-cards Lambda directly (no public endpoint)..."
          # NB: --region is explicit because the job's default region is
          # us-east-2 (where the S3 buckets still live). The Lambdas moved
          # to us-east-1 with the rest of the stack.
          aws lambda invoke \
            --region us-east-1 \
            --function-name creditodds-sync-cards \
            --payload '{"source":"github-action"}' \
            --cli-binary-format raw-in-base64-out \
            response.json
          echo "Lambda response envelope:"
          cat response.json
          # The handler returns an API-Gateway-style envelope {statusCode, body}
          # where body is a JSON string, so parse both layers.
          status=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('response.json','utf8'));console.log(r.statusCode||0)")
          echo "Sync statusCode: $status"
          if [ "$status" -ne 200 ]; then
            echo "Warning: Card sync returned non-200 status"
          fi
          # Extract wire_changes for social posting (double-parse: envelope -> body)
          wire_changes=$(node -e "const fs=require('fs');try{const r=JSON.parse(fs.readFileSync('response.json','utf8'));const b=JSON.parse(r.body||'{}');console.log(JSON.stringify(b.details?.wire_changes||[]))}catch{console.log('[]')}")
          echo "wire_changes=$wire_changes" >> "$GITHUB_OUTPUT"

      - name: Post CardWire updates to Twitter
        if: steps.sync.outputs.wire_changes != '[]'
        env:
          SOCIAL_API_URL: ${{ secrets.SOCIAL_API_URL }}
          SOCIAL_API_KEY: ${{ secrets.SOCIAL_API_KEY }}
          # Pass via env (not inline ${{ }}) so a card name with a quote can't
          # break out of the shell argument or inject commands.
          WIRE_CHANGES: ${{ steps.sync.outputs.wire_changes }}
        run: |
          echo "Posting CardWire changes..."
          node scripts/post-card-wire.js --changes "$WIRE_CHANGES"

      - name: Detect new card files
        id: new-cards
        run: |
          if [ -n "${{ inputs.test_post_file }}" ]; then
            echo "Test mode: using provided file"
            echo "files=${{ inputs.test_post_file }}" >> $GITHUB_OUTPUT
          else
            # `:(glob)` magic uses shell-style globbing — `*` matches a single
            # path component and does NOT cross `/`, so subdirectories under
            # data/cards/ (e.g. data/cards/images/) are correctly excluded.
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 -- ':(glob)data/cards/*.yaml' ':(glob)data/cards/*.yml' 2>/dev/null | tr '\n' ' ' | xargs)
            echo "files=$NEW_FILES" >> $GITHUB_OUTPUT
            if [ -n "$NEW_FILES" ]; then
              echo "New card files detected:"
              echo "$NEW_FILES"
            else
              echo "No new card files detected"
            fi
          fi

      - name: Queue new-card social posts
        if: steps.new-cards.outputs.files != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOCIAL_API_URL: ${{ secrets.SOCIAL_API_URL }}
          SOCIAL_API_KEY: ${{ secrets.SOCIAL_API_KEY }}
        run: node scripts/post-new-card.js --files ${{ steps.new-cards.outputs.files }}

      - name: Trigger Amplify rebuild
        env:
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$AMPLIFY_WEBHOOK_URL" ]; then
            echo "Triggering Amplify rebuild to update sitemap..."
            curl -s -X POST "$AMPLIFY_WEBHOOK_URL" || echo "Warning: Amplify webhook failed"
          else
            echo "Skipping Amplify rebuild (no webhook URL configured)"
          fi
