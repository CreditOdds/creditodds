name: Weekly Top Cards Post

on:
  schedule:
    # Every Wednesday at 3pm UTC (10am ET / 11am ET during DST)
    - cron: '0 15 * * 3'
  workflow_dispatch: {}

jobs:
  post-top-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Post weekly top viewed cards with image
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SOCIAL_API_URL: ${{ secrets.SOCIAL_API_URL }}
          SOCIAL_API_KEY: ${{ secrets.SOCIAL_API_KEY }}
        run: node scripts/post-weekly-top-cards.js
