name: Record Rejected News

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: record-rejected-news
  cancel-in-progress: false

jobs:
  record-rejected:
    if: >
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, 'news:reject') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'auto-news-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Record rejected news
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/record-rejected-news.js --pr ${{ github.event.pull_request.number }}

      - name: Commit rejected list if changed
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$(git status --porcelain data/news-rejected.yaml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/news-rejected.yaml
            git commit -m "Record rejected news from PR #${PR_NUMBER}"
            git push
          else
            echo "No rejected news to record"
          fi
