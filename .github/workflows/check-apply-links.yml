name: Check Apply Links

on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 1 PM UTC / 9 AM ET
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-apply-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Real Chrome (channel: chrome) has a far less bot-like fingerprint than
        # bundled chromium; chromium is kept as a fallback. See check-apply-links.js.
        run: npx playwright install chrome chromium --with-deps

      - name: Check apply links
        run: node scripts/check-apply-links.js

      - name: Open or update issue for broken links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RESULT_FILE=".apply-link-check-result.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "No result file found — nothing to do."
            exit 0
          fi

          BROKEN_COUNT=$(jq -r '.broken_count' "$RESULT_FILE")
          TOTAL=$(jq -r '.total' "$RESULT_FILE")
          CHECKED_AT=$(jq -r '.checked_at' "$RESULT_FILE")
          SUB_AT_RISK=$(jq -r '.sub_at_risk_count // 0' "$RESULT_FILE")

          # Ensure the label exists (idempotent — ignore if already created)
          gh label create "apply-link-check" \
            --description "Tracks broken card apply_link URLs detected by the daily health check" \
            --color "d73a4a" 2>/dev/null || true

          # Find any open issue tagged with our label
          EXISTING_ISSUE=$(gh issue list \
            --state open \
            --label "apply-link-check" \
            --limit 1 \
            --json number,title \
            --jq '.[0].number // empty')

          if [ "$BROKEN_COUNT" -eq 0 ]; then
            echo "All ${TOTAL} apply links (incl. special_apply_link) are healthy."
            if [ -n "$EXISTING_ISSUE" ]; then
              echo "Closing existing issue #${EXISTING_ISSUE}."
              gh issue close "$EXISTING_ISSUE" \
                --comment "All ${TOTAL} apply links resolved successfully on ${CHECKED_AT}. Closing automatically."
            fi
            exit 0
          fi

          # Build the issue body
          {
            echo "Apply-link health check found **${BROKEN_COUNT}** broken link(s) out of ${TOTAL} checked URLs."
            echo ""
            echo "_Last checked: ${CHECKED_AT}_"
            echo ""
            if [ "$SUB_AT_RISK" -gt 0 ]; then
              echo "> [!WARNING]"
              echo "> **${SUB_AT_RISK}** of these is a broken \`special_apply_link\` on a card that advertises a"
              echo "> \`signup_bonus\`. That bonus usually only exists on the offer landing page — if the page"
              echo "> is gone, remove the \`signup_bonus\` along with the \`special_apply_link\` rather than just"
              echo "> letting the card fall back to \`apply_link\` while still advertising a SUB we can't deliver."
              echo ""
            fi
            echo "| Card | Bank | Link | Reason | URL | Final URL |"
            echo "|------|------|------|--------|-----|-----------|"
            jq -r '.broken[] | "| \(.name) | \(.bank) | \(if .link_type == "special_apply_link" then (if .sub_at_risk then "special ⚠️ SUB" else "special" end) else "apply" end) | \(.reason) | [link](\(.apply_link)) | \(if .final_url then "[\(.final_url)](\(.final_url))" else "—" end) |"' "$RESULT_FILE"
            echo ""
            echo "---"
            echo "_Auto-generated by [check-apply-links.yml](../blob/main/.github/workflows/check-apply-links.yml). Re-run with the **Run workflow** button on the Actions tab._"
          } > .issue-body.md

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Updating existing issue #${EXISTING_ISSUE}."
            gh issue edit "$EXISTING_ISSUE" \
              --title "Broken apply links — ${BROKEN_COUNT} card(s) need review" \
              --body-file .issue-body.md
            gh issue comment "$EXISTING_ISSUE" \
              --body "Re-checked ${CHECKED_AT}: **${BROKEN_COUNT}** broken / ${TOTAL} total."
          else
            echo "Creating new issue."
            gh issue create \
              --title "Broken apply links — ${BROKEN_COUNT} card(s) need review" \
              --label "apply-link-check" \
              --body-file .issue-body.md
          fi
