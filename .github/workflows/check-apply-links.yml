name: Check Apply Links

on:
  schedule:
    - cron: '0 13 * * *'  # Daily at 1 PM UTC / 9 AM ET
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-apply-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Check apply links
        run: node scripts/check-apply-links.js

      - name: Open or update issue for broken links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RESULT_FILE=".apply-link-check-result.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "No result file found — nothing to do."
            exit 0
          fi

          BROKEN_COUNT=$(jq -r '.broken_count' "$RESULT_FILE")
          TOTAL=$(jq -r '.total' "$RESULT_FILE")
          CHECKED_AT=$(jq -r '.checked_at' "$RESULT_FILE")

          # Find any open issue tagged with our label
          EXISTING_ISSUE=$(gh issue list \
            --state open \
            --label "apply-link-check" \
            --limit 1 \
            --json number,title \
            --jq '.[0].number // empty')

          if [ "$BROKEN_COUNT" -eq 0 ]; then
            echo "All ${TOTAL} apply links are healthy."
            if [ -n "$EXISTING_ISSUE" ]; then
              echo "Closing existing issue #${EXISTING_ISSUE}."
              gh issue close "$EXISTING_ISSUE" \
                --comment "All ${TOTAL} apply links resolved successfully on ${CHECKED_AT}. Closing automatically."
            fi
            exit 0
          fi

          # Build the issue body
          {
            echo "Apply-link health check found **${BROKEN_COUNT}** broken link(s) out of ${TOTAL} active cards."
            echo ""
            echo "_Last checked: ${CHECKED_AT}_"
            echo ""
            echo "| Card | Bank | Reason | Apply Link | Final URL |"
            echo "|------|------|--------|------------|-----------|"
            jq -r '.broken[] | "| \(.name) | \(.bank) | \(.reason) | [link](\(.apply_link)) | \(if .final_url then "[\(.final_url)](\(.final_url))" else "—" end) |"' "$RESULT_FILE"
            echo ""
            echo "---"
            echo "_Auto-generated by [check-apply-links.yml](../blob/main/.github/workflows/check-apply-links.yml). Re-run with the **Run workflow** button on the Actions tab._"
          } > .issue-body.md

          if [ -n "$EXISTING_ISSUE" ]; then
            echo "Updating existing issue #${EXISTING_ISSUE}."
            gh issue edit "$EXISTING_ISSUE" \
              --title "Broken apply links — ${BROKEN_COUNT} card(s) need review" \
              --body-file .issue-body.md
            gh issue comment "$EXISTING_ISSUE" \
              --body "Re-checked ${CHECKED_AT}: **${BROKEN_COUNT}** broken / ${TOTAL} total."
          else
            echo "Creating new issue."
            gh issue create \
              --title "Broken apply links — ${BROKEN_COUNT} card(s) need review" \
              --label "apply-link-check" \
              --body-file .issue-body.md
          fi
