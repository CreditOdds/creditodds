name: Auto News Update

# Discovers credit-card news from broad sources — Brave web search, Google News
# RSS, and xAI Grok (X/Twitter search) across the major issuers — and opens a PR
# with generated data/news YAML for HUMAN REVIEW (never auto-merges). Complements
# the Content Intelligence Agent, which watches specific competitor X accounts.
# Restored after #1351 removed it; the script now runs on OpenAI + Grok (the old
# ANTHROPIC_API_KEY env line was already dead after the CI provider switch).

on:
  schedule:
    - cron: '0 14 * * *'  # 2 PM UTC / 9 AM ET
    - cron: '0 0 * * *'   # 12 AM UTC / 7 PM ET
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto news update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: node scripts/auto-news-update.js

      - name: Create PR if news found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any new files were created
          if [ -n "$(git status --porcelain data/news/)" ]; then
            BRANCH="auto-news-$(date +%Y-%m-%d-%H%M%S)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add data/news/
            git commit -m "Add auto-generated news items for $(date +%Y-%m-%d)"
            git push -u origin "$BRANCH"

            # Create PR body file
            cat > /tmp/pr-body.md << 'PREOF'
          ## Auto-Generated News Items

          This PR contains automatically generated news items for review.

          ### How to Review
          1. Check each YAML file in `data/news/` for accuracy
          2. Verify the news is relevant and not a duplicate
          3. Edit any summaries that need improvement
          4. Remove any items that aren't newsworthy
          5. To reject all items, add the `news:reject` label and close the PR

          ### Source
          Generated by the auto-news-update script using:
          - Brave Search API for article discovery
          - Google News RSS for headlines
          - xAI Grok for X/Twitter news discovery
          - OpenAI (gpt-4o-mini) for content extraction and formatting

          ---
          *This is an automated PR. Please review carefully before merging.*
          PREOF

            gh pr create \
              --title "Auto News Update $(date +%Y-%m-%d)" \
              --body-file /tmp/pr-body.md
          else
            echo "No new news items found"
          fi
