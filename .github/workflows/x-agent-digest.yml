name: X Reply Agent Digest

# Daily summary of what the reply agent posted (or, in shadow mode, would have
# posted) in the last 24h, with engagement metrics for live replies. Prints to
# the Actions run log.

on:
  schedule:
    - cron: '0 13 * * *' # ~9am ET
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::953352003729:role/GitHubActions-CreditOdds
          aws-region: us-east-2

      - name: Print digest
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          X_AGENT_STATE_S3: s3://${{ secrets.S3_BUCKET_NAME }}/x-agent/state.json
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/x-agent/digest.js
