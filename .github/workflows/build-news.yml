name: Build and Deploy News

on:
  push:
    branches:
      - main
    paths:
      - 'data/news/**'
  workflow_dispatch:
    inputs:
      test_post_file:
        description: 'Test social posting with a specific news file (e.g. data/news/2026-02-25-chase-apple-card-transition.yaml)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Need previous commit to detect new files

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # cards.json is gitignored, so it is absent from a fresh checkout. build-news.js
      # looks up each related card's image filename in data/cards.json; without it every
      # card_image_links entry resolves to null and gets filtered to [], leaving related
      # cards with no art on the live site. Build cards first so the lookup succeeds.
      - name: Build cards.json
        run: npm run build:cards

      - name: Build news.json
        run: npm run build:news

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::953352003729:role/GitHubActions-CreditOdds
          aws-region: us-east-2

      # Non-blocking on purpose. A hero image is decoration; the article is the
      # product. This step is not allowed to decide whether news ships.
      #
      # It blocked publishing twice on 2026-07-21 — once when the OpenAI balance
      # ran out, once on a bad parameter — and because every later step is
      # sequential, `Upload news.json to S3`, the Amplify rebuild, the social
      # queue and IndexNow were all skipped. The article existed on main and was
      # invisible on the site, which is a worse outcome than an article with a
      # missing image.
      #
      # A failure here is still surfaced: the next step annotates the run and
      # `image_status` marks the job so a silent image outage cannot masquerade
      # as a clean deploy.
      - name: Sync news hero images (generate missing via OpenAI)
        id: hero-images
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S3_IMAGES_BUCKET_NAME: ${{ secrets.S3_IMAGES_BUCKET_NAME }}
        run: node scripts/sync-news-images.js

      - name: Flag hero-image failure
        if: steps.hero-images.outcome == 'failure'
        run: |
          echo "::warning title=Hero images failed::sync-news-images.js failed; news is publishing without new hero images. Check the OpenAI balance and the step log above."
          {
            echo "### ⚠️ Hero images failed"
            echo ""
            echo "\`sync-news-images.js\` did not complete. News still published, but any new item may be missing its hero image (used on the news page, the OG card, and the social post)."
            echo ""
            echo "Re-run this workflow once the cause is fixed to backfill; S3 is the source of truth, so images that already exist are not regenerated."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload news.json to S3
        run: aws s3 cp data/news.json s3://${{ secrets.S3_BUCKET_NAME }}/news.json --content-type application/json --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/news.json"

      - name: Wait for CloudFront invalidation
        run: |
          echo "Waiting 30 seconds for CloudFront cache invalidation..."
          sleep 30

      - name: Trigger Amplify rebuild
        env:
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$AMPLIFY_WEBHOOK_URL" ]; then
            echo "Triggering Amplify rebuild..."
            curl -s -X POST "$AMPLIFY_WEBHOOK_URL" || echo "Warning: Amplify webhook failed"
          else
            echo "Skipping Amplify rebuild (no webhook URL configured)"
          fi

      - name: Detect new news files
        id: new-files
        run: |
          if [ -n "${{ inputs.test_post_file }}" ]; then
            echo "Test mode: using provided file"
            echo "files=${{ inputs.test_post_file }}" >> $GITHUB_OUTPUT
          else
            # `:(glob)` magic uses shell-style globbing — `*` matches a single path
            # component and does NOT cross `/`, so any subdirectory under data/news/
            # is correctly excluded.
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 -- ':(glob)data/news/*.yaml' ':(glob)data/news/*.yml' 2>/dev/null | tr '\n' ' ' | xargs)
            echo "files=$NEW_FILES" >> $GITHUB_OUTPUT
            if [ -n "$NEW_FILES" ]; then
              echo "New news files detected:"
              echo "$NEW_FILES"
            else
              echo "No new news files detected"
            fi
          fi

      - name: Queue new news for social media
        if: steps.new-files.outputs.files != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOCIAL_API_URL: ${{ secrets.SOCIAL_API_URL }}
          SOCIAL_API_KEY: ${{ secrets.SOCIAL_API_KEY }}
        run: node scripts/queue-social.js --type news --files ${{ steps.new-files.outputs.files }}

      - name: Notify IndexNow of new news URLs
        if: steps.new-files.outputs.files != ''
        run: node scripts/submit-indexnow.js --type news --files ${{ steps.new-files.outputs.files }}
